<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>flatbase</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      font-size: 13px;
      background: #f5f5f5;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    #header {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 8px 16px;
      background: #1e1e2e;
      color: #cdd6f4;
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    .app-title { font-weight: 700; font-size: 14px; white-space: nowrap; }
    .app-title small { font-weight: 400; opacity: 0.6; font-size: 11px; }

    #domain-filters { display: flex; gap: 10px; flex-wrap: wrap; flex: 1; }

    .domain-chip {
      display: flex;
      align-items: center;
      gap: 5px;
      cursor: pointer;
      padding: 3px 8px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
      color: #fff;
      user-select: none;
      opacity: 1;
      transition: opacity 0.15s;
    }
    .domain-chip.off { opacity: 0.35; }
    .domain-chip input { accent-color: #fff; cursor: pointer; }
    .domain-chip input[type="color"] {
      width: 14px;
      height: 14px;
      padding: 0;
      border: none;
      background: none;
      border-radius: 3px;
    }

    #reset-btn, #export-btn, #reload-data-btn, #fit-btn {
      background: #313244;
      color: #cdd6f4;
      border: 1px solid #45475a;
      padding: 4px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      white-space: nowrap;
    }
    #reset-btn:hover, #export-btn:hover, #reload-data-btn:hover, #fit-btn:hover { background: #45475a; }

    #main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    #sidebar {
      width: 260px;
      flex-shrink: 0;
      overflow-y: auto;
      background: #fff;
      border-right: 1px solid #e0e0e0;
      padding: 8px 0;
    }

    #sidebar-tools {
      position: sticky;
      top: -8px;               /* cancels #sidebar's top padding while stuck */
      margin-top: -8px;
      background: #fff;
      padding: 10px 12px 8px;
      border-bottom: 1px solid #eee;
      z-index: 2;
    }
    #sidebar-search {
      width: 100%;
      box-sizing: border-box;
      padding: 5px 8px;
      font-size: 12px;
      border: 1px solid #cbd5e0;
      border-radius: 5px;
      outline: none;
    }
    #sidebar-search:focus { border-color: #94a3b8; }
    #sidebar-count { font-size: 10px; color: #94a3b8; margin-top: 4px; }

    .sidebar-domain { padding: 6px 12px 2px; }
    .sidebar-domain-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      opacity: 0.5;
      display: flex;
      justify-content: space-between;
    }
    .sidebar-domain-count { font-weight: 400; }

    .sidebar-table {
      padding: 5px 16px;
      cursor: pointer;
      border-left: 3px solid transparent;
      line-height: 1.3;
      transition: background 0.1s;
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }
    .sidebar-table .row-body { flex: 1; min-width: 0; }
    .sidebar-table:hover { background: #f0f0f0; }
    .sidebar-table.highlighted { background: #fef3c7; border-left-color: #f59e0b; }
    .sidebar-table.hidden-node { opacity: 0.35; }
    .sidebar-table.hidden-node .row-body { text-decoration: line-through; }

    .eye-toggle {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
      margin-top: 2px;
      border-radius: 3px;
      border: 1px solid #cbd5e0;
      background: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      color: #4a5568;
      user-select: none;
      padding: 0;
    }
    .eye-toggle:hover { background: #edf2f7; }
    .eye-toggle.hidden-state { background: #f7fafc; color: #cbd5e0; }
    .eye-toggle.disabled { opacity: 0.3; cursor: not-allowed; }

    .table-name-en { font-weight: 600; font-size: 12px; }
    .table-name-ja { font-size: 11px; color: #888; }
    .table-badges { display: flex; gap: 4px; margin-top: 2px; flex-wrap: wrap; }
    .badge {
      font-size: 9px;
      padding: 1px 5px;
      border-radius: 3px;
      font-weight: 600;
      background: #e5e7eb;
      color: #374151;
    }
    .badge.tag { background: #edf2f7; color: #4a5568; }
    .badge.proposed { background: #ede9fe; color: #5b21b6; }
    .node.arb-ignored { opacity: 0.35; }
    .sidebar-table.arb-ignored .table-name-en { text-decoration: line-through; opacity: 0.5; }

    #diagram-wrap {
      flex: 1;
      overflow: hidden;              /* viewport <g> transform navigates — no scrollbars */
      background: #fafafa;
      position: relative;
    }

    #diagram {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
    }
    #diagram.grab { cursor: grab; }
    #diagram.panning { cursor: grabbing; }

    /* SVG node styles */
    .node rect {
      stroke-width: 1.5;
      rx: 6;
      cursor: pointer;
      transition: filter 0.15s;
    }
    .node rect:hover { filter: brightness(0.92); }
    .node.hidden { display: none; }
    .node.highlighted rect { stroke-width: 3; stroke: #f59e0b !important; }
    .node text { pointer-events: none; }

    .edge { opacity: 0.55; transition: opacity 0.15s; }
    .edge > path:not(.hit-path), .edge text { pointer-events: none; }
    .edge > path.hit-path { pointer-events: stroke; stroke: transparent; fill: none; cursor: default; }
    .edge text { opacity: 0; transition: opacity 0.15s; pointer-events: none; }
    .edge .cardinality { fill: #1e293b; }
    .edge .cardinality-bg {
      fill: #ffffff;
      stroke: #cbd5e1;
      stroke-width: 0.8;
      opacity: 0;
      transition: opacity 0.15s;
      pointer-events: fill;
    }
    .edge.hidden { display: none; }

    /* Focus mode (persistent click state). .dim fades non-neighbours and drops
       their pointer events; .hi emphasises the focused neighbourhood. Placed
       AFTER .node.arb-ignored so dim (0.15) wins over ignored (0.35) when both
       apply; a *neighbour* that is arb-ignored keeps .hi (stays at 0.35, still
       recognisable). Proposed violet/dash is inline on the rect (stroke +
       dasharray) so opacity dimming and the stroke-width bump never erase it. */
    .node.dim, .edge.dim { opacity: 0.15; pointer-events: none; }
    .node.hi rect { stroke-width: 2.6; }
    .edge.hi { opacity: 1; }
    .edge.hi > path.edge-line { stroke-width: 2.4; }
    /* Crow's-foot cardinality marks: never interactive, never dashed (a dashed
       fork reads as broken), and excluded from the focus stroke-width bump. */
    .edge-marker { pointer-events: none; fill: none; stroke-dasharray: none; }

    /* Labels (type label + cardinality badge) are revealed only by directly hovering the edge
       or via a detail-pane pair/bundle highlight. Hovering a connected node does not reveal them. */
    .edge:hover text,
    .edge:hover .cardinality-bg,
    .edge.is-pair text,
    .edge.is-pair .cardinality-bg { opacity: 1; }

    /* When something is being hovered, dim everything by default. Suppressed
       while focus mode is active — focus wins, its .dim/.hi governs instead. */
    body:not(.focusing).hovering .edge { opacity: 0.12; }
    body:not(.focusing).hovering .edge.is-touching { opacity: 1; }
    body:not(.focusing).hovering .node:not(.is-touching-hover) rect { opacity: 0.45; }

    /* Hover originating from the detail pane: overlay an orange emphasis on the specific link(s),
       while the selected table's normal neighborhood highlight stays intact. */
    body.hovering-from-detail .node.is-pair rect {
      stroke: #f97316 !important;
      stroke-width: 3;
      filter: drop-shadow(0 0 6px rgba(249, 115, 22, 0.6));
    }
    body.hovering-from-detail .edge.is-pair path,
    body.hovering-from-detail .edge.is-pair line {
      stroke: #f97316 !important;
      stroke-width: 3;
      filter: drop-shadow(0 0 4px rgba(249, 115, 22, 0.55));
    }

    #detail-panel {
      width: 380px;
      flex-shrink: 0;
      background: #fff;
      border-left: 1px solid #e0e0e0;
      box-shadow: -2px 0 10px rgba(0,0,0,0.05);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #detail-panel.closed { display: none; }
    #detail-panel header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      border-bottom: 1px solid #e2e8f0;
      background: #f7fafc;
    }
    #detail-panel h2 {
      font-size: 16px;
      font-weight: 700;
      color: #1a202c;
      margin: 0;
    }
    #detail-close {
      background: transparent;
      border: none;
      font-size: 24px;
      cursor: pointer;
      color: #718096;
      line-height: 1;
      padding: 0 4px;
    }
    #detail-close:hover { color: #1a202c; }
    #detail-body {
      flex: 1;
      overflow-y: auto;
      padding: 14px 18px;
      font-size: 13px;
      line-height: 1.5;
    }
    .detail-section { margin-bottom: 18px; }
    .detail-section-title {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #718096;
      margin-bottom: 6px;
    }
    .detail-meta-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
    }
    .detail-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 600;
      color: #fff;
    }
    .detail-relation {
      padding: 6px 8px;
      margin-bottom: 4px;
      background: #f7fafc;
      border-left: 3px solid #cbd5e0;
      border-radius: 0 4px 4px 0;
      font-size: 12px;
    }
    .detail-relation .rel-type {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      color: #718096;
      letter-spacing: 0.05em;
    }
    .detail-relation .rel-target {
      font-weight: 600;
      color: #2d3748;
    }
    .detail-relation .rel-self {
      font-weight: 600;
      color: #92400e;
      background: #fef3c7;
      padding: 1px 6px;
      border-radius: 3px;
      font-style: italic;
    }
    .detail-relation.navigable {
      cursor: pointer;
      transition: background 0.12s, border-left-color 0.12s;
    }
    .detail-relation.navigable .rel-target { color: #3182ce; }
    .detail-relation.navigable:hover {
      background: #fff7ed;
      border-left-color: #f97316;
    }
    .detail-relation .rel-label { color: #718096; font-style: italic; font-size: 11px; }
    .detail-relation.poly { display: flex; flex-wrap: wrap; align-items: center; gap: 6px; border-left-color: #f59e0b; }
    .detail-relation.poly .rel-poly-label { font-weight: 600; color: #2d3748; }
    .detail-relation.poly .rel-chips { display: inline-flex; flex-wrap: wrap; gap: 4px; }
    .rel-chip {
      display: inline-block;
      padding: 2px 7px;
      border-radius: 10px;
      background: #edf2f7;
      color: #2d3748;
      font-size: 11px;
      font-weight: 500;
    }
    .rel-chip.navigable { cursor: pointer; color: #3182ce; transition: background 0.12s; }
    .rel-chip.navigable:hover { background: #fff7ed; color: #c2410c; }
    .rel-chip-wildcard { background: #fef3c7; color: #92400e; font-style: italic; }
    .detail-relation.detail-relation-bundle { cursor: default; transition: background 0.12s, border-left-color 0.12s; }
    .detail-relation.detail-relation-bundle:hover { background: #fff7ed; border-left-color: #f97316; }
    .detail-notes {
      padding: 8px 10px;
      background: #fffaf0;
      border-left: 3px solid #ed8936;
      border-radius: 0 4px 4px 0;
      color: #744210;
    }
    .detail-columns {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }
    .detail-columns th, .detail-columns td {
      text-align: left;
      padding: 4px 8px;
      border-bottom: 1px solid #edf2f7;
      vertical-align: top;
    }
    .detail-columns th {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #718096;
      font-weight: 700;
    }
    .detail-columns .col-name { font-weight: 600; color: #2d3748; }
    .detail-columns .col-type { color: #718096; font-family: ui-monospace, Menlo, monospace; font-size: 11px; }
    .detail-columns .col-flags { font-size: 10px; }
    .detail-columns .col-flag {
      display: inline-block;
      padding: 1px 5px;
      border-radius: 3px;
      margin-right: 3px;
      font-weight: 600;
      background: #edf2f7;
      color: #4a5568;
    }
    .detail-columns .col-flag.pk { background: #fef3c7; color: #92400e; }
    .detail-columns .col-flag.fk { background: #dbeafe; color: #1e40af; }
    .detail-columns tr.navigable { cursor: pointer; transition: background 0.12s; }
    .detail-columns tr.navigable:hover td { background: #fff7ed; }
    .detail-columns .col-flag.nn { background: #fed7d7; color: #742a2a; }
    .detail-columns .col-flag.proposed { background: #ede9fe; color: #5b21b6; }
    .detail-columns tr.arb-ignored td { opacity: 0.4; text-decoration: line-through; }
    .arb-btn { font-size: 9px; padding: 1px 5px; margin-left: 3px; border: none;
      border-radius: 3px; cursor: pointer; background: #e2e8f0; color: #4a5568; }
    .arb-btn:hover { background: #cbd5e0; }
    .arb-btn.on { background: #ede9fe; color: #5b21b6; font-weight: 600; }
    #export-proposal-btn { background: #6d28d9; color: #fff; }
    #export-proposal-btn:hover { background: #5b21b6; }
    .detail-columns .col-notes { color: #718096; font-style: italic; font-size: 11px; }
    .detail-columns .col-evidence, .detail-evidence { color: #6d28d9; font-style: italic; font-size: 11px; }
    .detail-columns .col-flag.inferred { background: #f1f5f9; color: #94a3b8; font-style: italic; }
    .detail-columns .col-flag.enum-gap { background: #fde8e8; color: #c53030; }
    .detail-columns tr.col-inferred .col-name { font-style: italic; color: #718096; }
    .detail-arb-note { color: #6d28d9; font-size: 11px; font-weight: 600; margin-top: 4px; }
    #detail-hide-btn {
      margin-top: 12px;
      width: 100%;
      padding: 8px 12px;
      background: #fed7d7;
      color: #742a2a;
      border: 1px solid #fc8181;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 600;
      font-size: 12px;
    }
    #detail-hide-btn:hover { background: #fbb6b6; }
    #detail-hide-btn.is-hidden { background: #c6f6d5; color: #22543d; border-color: #68d391; }
    #detail-hide-btn.is-hidden:hover { background: #9ae6b4; }
  </style>
</head>
<body>

<header id="header">
  <span class="app-title">flatbase <small>v0.5</small></span>
  <div id="domain-filters"></div>
  <select id="proposed-filter" title="Filter by proposed/defined">
    <option value="all">Show: All</option>
    <option value="proposed">Proposed only</option>
    <option value="defined">Defined only</option>
  </select>
  <button id="fit-btn" title="Fit the whole diagram into view">Fit</button>
  <button id="reset-btn">Reset</button>
  <button id="reload-data-btn" title="Load a different tables.json (also clears arbitration decisions)">↻ Data</button>
  <button id="export-btn" title="Download a standalone HTML viewer with this schema baked in">↓ Export</button>
  <button id="export-proposal-btn" style="display:none" title="Download the arbitrated proposal.json (kept + overruled, ignored removed)">↓ Proposal</button>
</header>

<div id="main">
  <nav id="sidebar">
    <div id="sidebar-tools">
      <input id="sidebar-search" type="search" placeholder="Search tables…" autocomplete="off">
      <div id="sidebar-count"></div>
    </div>
    <div id="sidebar-list"></div>
  </nav>
  <div id="diagram-wrap">
    <svg id="diagram">
      <defs id="svg-defs"></defs>
      <g id="viewport">
        <g id="edge-layer"></g>
        <g id="node-layer"></g>
      </g>
    </svg>
  </div>
  <aside id="detail-panel" class="closed">
    <header>
      <h2 id="detail-name-en"></h2>
      <button id="detail-close" aria-label="Close">×</button>
    </header>
    <div id="detail-body"></div>
  </aside>
</div>

<script>
let DATA = null;
let DOMAIN_ORDER = [];
let DOMAIN_COLORS = {};

const NODE_W = 190;
const NODE_H = 72;

// Mutable state
let hiddenNodes = new Set();
let cascadeHiddenNodes = new Set();
let hiddenDomains = new Set();
let proposedFilter = 'all';
let sidebarSearch = '';        // lowercase needle; filters the sidebar list only
let highlightedNode = null;

// Focus mode (persistent click state) — distinct from the transient hover state
// (setHoveredNode). A focused node dims everything but its neighbourhood.
let focusedNode = null;        // id of the click-focused node, or null
let focusedEdge = null;        // { from, to } of the click-focused edge, or null

// Viewport (pan/zoom) state — the #viewport <g> carries translate + scale.
let panX = 0, panY = 0, zoomK = 1;
let spaceDown = false;         // hand-tool modifier (Space held)
let panning = null;            // active pan gesture, or null
let panMoved = false;          // set on pan-move / drag-move → swallow the click it emits
let dragNode = null;           // active node-drag gesture, or null
let dragRAF = null;            // rAF handle throttling the drag redraw

function tableTags(t) {
  return Array.isArray(t.tags)
    ? t.tags.filter(x => typeof x === 'string' && x.trim()).map(x => x.trim())
    : [];
}

function matchesSearch(t) {
  if (!sidebarSearch) return true;
  return (t.name + ' ' + (t.name_ja || '') + ' ' + t.id + ' ' + tableTags(t).join(' '))
    .toLowerCase().includes(sidebarSearch);
}

function matchesProposedFilter(t) {
  if (proposedFilter === 'proposed') return !!t.proposed;
  if (proposedFilter === 'defined')  return !t.proposed;
  return true;
}

// --- Proposal arbitration (Sub-spec 2) ---
// A proposal.json is a flatbase schema carrying `proposed:true` elements. The operator
// arbitrates per proposed element. Decisions persist in localStorage keyed by project.
// Export writes the arbitrated proposal.json (kept + overruled, ignored removed) for
// tools/apply-proposal.py. Arbitration keys:
//   `${tableId}::${colName}` -> { ignore?:true, type?:string }   (per proposed column)
//   `table::${tableId}`      -> { ignore?:true }                 (whole proposed table)
//   `enum::${enumId}`        -> { ignore?:true }                 (proposed enum)
// A table literally named "table" or "enum" would collide with the namespaced kinds;
// theoretical, accepted.
let RAW_INPUT = null;            // pristine loaded schema (pre-normalize), source for export
let arbitration = {};
function arbKey() { return 'flatbase.arbitration.' + ((DATA.meta && DATA.meta.project) || 'default'); }
function colArb(tid, name) { return arbitration[tid + '::' + name] || {}; }
function tableArb(tid)     { return arbitration['table::' + tid] || {}; }
function enumArb(eid)      { return arbitration['enum::' + eid] || {}; }
function setArb(key, mutator) {
  const entry = arbitration[key] || {};
  mutator(entry);
  if (Object.keys(entry).length) arbitration[key] = entry;
  else delete arbitration[key];
  saveArbitration();
}
function loadArbitration() {
  try { arbitration = JSON.parse(localStorage.getItem(arbKey())) || {}; }
  catch { arbitration = {}; }
}
function saveArbitration() {
  try { localStorage.setItem(arbKey(), JSON.stringify(arbitration)); } catch {}
}
function exportProposal() {
  if (!RAW_INPUT) return;
  const out = JSON.parse(JSON.stringify(RAW_INPUT));
  let keptTables = 0, ignoredTables = 0;
  let kept = 0, ignored = 0, overruled = 0, droppedFks = 0;
  let keptEnums = 0, ignoredEnums = 0;

  // 1. Whole-table arbitration — only PROPOSED tables are droppable.
  const droppedIds = new Set();
  out.tables = (out.tables || []).filter(t => {
    if (!t.proposed) return true;
    if (tableArb(t.id).ignore) { ignoredTables++; droppedIds.add(t.id); return false; }
    keptTables++;
    return true;
  });

  // 2. Column arbitration + dangling-FK hygiene.
  for (const t of out.tables) {
    if (!Array.isArray(t.columns)) continue;
    t.columns = t.columns.map(col => {
      const c = typeof col === 'string' ? { name: col } : col;
      // Only PROPOSED columns are arbitrable; a stale key must never touch a baseline column.
      const arb = c.proposed ? colArb(t.id, c.name) : null;
      if (arb && arb.type != null && !arb.ignore) {
        overruled++;
        if (typeof col === 'string') return { name: col, type: arb.type };
        col.type = arb.type;
      }
      return col;
    }).filter(col => {
      const c = typeof col === 'string' ? { name: col } : col;
      if (!c.proposed) return true;
      if (colArb(t.id, c.name).ignore) { ignored++; return false; }
      // A proposed FK whose target table was dropped would break apply-proposal.
      const fkTarget = c.fk && (typeof c.fk === 'string' ? c.fk : c.fk.table);
      if (fkTarget && droppedIds.has(fkTarget)) { droppedFks++; return false; }
      kept++;
      return true;
    });
  }

  // 3. Enum arbitration — only PROPOSED enums are droppable.
  if (Array.isArray(out.enums)) {
    out.enums = out.enums.filter(e => {
      if (!e.proposed) return true;
      if (enumArb(e.id).ignore) { ignoredEnums++; return false; }
      keptEnums++;
      return true;
    });
  }

  const blob = new Blob([JSON.stringify(out, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'proposal.arbitrated.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(a.href);
  alert('Arbitrated proposal exported.\n' +
        'Tables: ' + keptTables + ' proposed kept, ' + ignoredTables + ' ignored.\n' +
        'Columns: ' + kept + ' proposed kept (' + overruled + ' overruled), ' + ignored + ' ignored' +
        (droppedFks ? ', ' + droppedFks + ' dropped (FK target ignored)' : '') + '.\n' +
        'Enums: ' + keptEnums + ' proposed kept, ' + ignoredEnums + ' ignored.\n' +
        'Feed it to tools/apply-proposal.py.');
}
let positions = {}; // { [id]: { x, y } }

// Seeded PRNG (mulberry32). The layout path must never touch Math.random /
// Date.now so two fresh loads of the same schema produce byte-identical
// positions. Reset to LAYOUT_SEED at the top of every computePositions().
const LAYOUT_SEED = 0x1a2b3c4d;
let _layoutSeed = LAYOUT_SEED;
function layoutRng() {
  _layoutSeed = (_layoutSeed + 0x6D2B79F5) | 0;
  let t = Math.imul(_layoutSeed ^ (_layoutSeed >>> 15), 1 | _layoutSeed);
  t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
  return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
}

// Fruchterman-Reingold "hub-and-spoke" layout. World coordinates centered at
// origin (no translate-to-positive — the viewport transform + Fit place the
// graph on screen). Pure + deterministic: writes `positions`, reads DATA only.
function computePositions() {
  _layoutSeed = LAYOUT_SEED;                       // reset seed → deterministic

  const ids = DATA.tables.map(t => t.id);
  const adj = {};
  ids.forEach(id => { adj[id] = new Set(); });

  // Layout edges come from the SAME normalized set the renderer draws
  // (collectEdges), so parallel relations of distinct types are preserved and
  // the simulation matches the picture. Self-loops don't pull.
  const ledges = [];
  for (const e of collectEdges()) {
    if (e.from === e.to) continue;
    if (adj[e.from] === undefined || adj[e.to] === undefined) continue;
    adj[e.from].add(e.to); adj[e.to].add(e.from);
    ledges.push(e);
  }

  const deg = {}; ids.forEach(id => { deg[id] = adj[id].size; });
  const conn = ids.filter(id => deg[id] > 0);
  const iso  = ids.filter(id => deg[id] === 0);
  // Highest-degree connected node → pinned hub at the origin.
  const center = conn.reduce((a, b) => (deg[b] > deg[a] ? b : a), conn[0] || ids[0]);

  const pos = {};
  conn.forEach(id => {
    const a = layoutRng() * 6.2832, r = 110 + layoutRng() * 420;
    pos[id] = { x: Math.cos(a) * r, y: Math.sin(a) * r };
  });
  if (center) pos[center] = { x: 0, y: 0 };

  const K = 190;                 // ideal edge length ≈ node width
  const ITER = 420, G = 0.14;    // iterations, center-gravity pull
  let temp = 420;                // annealing temperature (× 0.975 / iter)

  for (let it = 0; it < ITER; it++) {
    const dsp = {}; conn.forEach(id => { dsp[id] = { x: 0, y: 0 }; });

    // Repulsion K²/d
    for (let i = 0; i < conn.length; i++) {
      for (let j = i + 1; j < conn.length; j++) {
        const A = pos[conn[i]], B = pos[conn[j]];
        let dx = A.x - B.x, dy = A.y - B.y;
        const d = Math.hypot(dx, dy) || 0.01;
        const f = (K * K) / d, fx = dx / d * f, fy = dy / d * f;
        dsp[conn[i]].x += fx; dsp[conn[i]].y += fy;
        dsp[conn[j]].x -= fx; dsp[conn[j]].y -= fy;
      }
    }
    // Attraction d²/K
    for (const e of ledges) {
      const A = pos[e.from], B = pos[e.to];
      let dx = A.x - B.x, dy = A.y - B.y;
      const d = Math.hypot(dx, dy) || 0.01;
      const f = (d * d) / K, fx = dx / d * f, fy = dy / d * f;
      dsp[e.from].x -= fx; dsp[e.from].y -= fy;
      dsp[e.to].x   += fx; dsp[e.to].y   += fy;
    }
    // Center gravity
    conn.forEach(id => { dsp[id].x -= pos[id].x * G; dsp[id].y -= pos[id].y * G; });
    // Integrate with temperature-limited step; re-pin the hub each iteration.
    conn.forEach(id => {
      if (id === center) return;
      const dx = dsp[id].x, dy = dsp[id].y, d = Math.hypot(dx, dy) || 0.01;
      const lim = Math.min(d, temp);
      pos[id].x += dx / d * lim; pos[id].y += dy / d * lim;
    });
    if (center) pos[center] = { x: 0, y: 0 };
    temp *= 0.975;
  }

  positions = pos;
  resolveOverlaps(conn, 30, 26, 320);
  packComponents(conn, adj);
  parkIsolated(conn, iso);
}

// Nudge apart any pair of boxes still overlapping after the force pass.
function resolveOverlaps(nodes, mxg, myg, iters) {
  const mw = NODE_W + mxg, mh = NODE_H + myg;
  for (let t = 0; t < iters; t++) {
    let moved = false;
    for (let i = 0; i < nodes.length; i++) {
      for (let j = i + 1; j < nodes.length; j++) {
        const A = positions[nodes[i]], B = positions[nodes[j]];
        const dx = A.x - B.x, dy = A.y - B.y;
        const ox = mw - Math.abs(dx), oy = mh - Math.abs(dy);
        if (ox > 0 && oy > 0) {
          moved = true;
          if (ox < oy) { const s = (dx < 0 ? -1 : 1) * ox / 2; A.x += s; B.x -= s; }
          else         { const s = (dy < 0 ? -1 : 1) * oy / 2; A.y += s; B.y -= s; }
        }
      }
    }
    if (!moved) break;
  }
}

// Shelf-tile disconnected components so they don't blow up the extent.
// No-op for a single connected component (the common case) — the force
// result (centered at origin) is then left untouched.
function packComponents(conn, adj) {
  if (conn.length < 2) return;
  const seen = new Set(), comps = [];
  conn.forEach(s => {
    if (seen.has(s)) return;
    const q = [s], c = []; seen.add(s);
    while (q.length) { const u = q.pop(); c.push(u); adj[u].forEach(v => { if (!seen.has(v)) { seen.add(v); q.push(v); } }); }
    comps.push(c);
  });
  if (comps.length < 2) return;
  const GAP = 80, W = NODE_W, H = NODE_H;
  const boxes = comps.map(c => {
    let xn = 1e9, xx = -1e9, yn = 1e9, yx = -1e9;
    c.forEach(id => { const p = positions[id]; xn = Math.min(xn, p.x); xx = Math.max(xx, p.x + W); yn = Math.min(yn, p.y); yx = Math.max(yx, p.y + H); });
    return { c, xn, yn, w: xx - xn, h: yx - yn, area: (xx - xn) * (yx - yn) };
  });
  boxes.sort((a, b) => b.area - a.area);
  const rowW = Math.max(boxes[0].w, Math.sqrt(boxes.reduce((a, b) => a + b.area, 0)) * 1.4);
  let cx = 0, cy = 0, rowH = 0;
  boxes.forEach(b => {
    if (cx > 0 && cx + b.w > rowW) { cx = 0; cy += rowH + GAP; rowH = 0; }
    const dx = cx - b.xn, dy = cy - b.yn;
    b.c.forEach(id => { positions[id].x += dx; positions[id].y += dy; });
    cx += b.w + GAP; rowH = Math.max(rowH, b.h);
  });
}

// Drop isolated (no-relation) nodes into empty pockets inside the connected
// cluster's bounding box, falling back to a grid below it.
function parkIsolated(conn, iso) {
  if (!iso.length) return;
  const W = NODE_W, H = NODE_H, GX = 30, GY = 26, STEP = 24;
  if (!conn.length) {
    const gx = W + 40;
    iso.forEach((id, i) => { positions[id] = { x: (i % 3) * gx, y: Math.floor(i / 3) * (H + 30) }; });
    return;
  }
  let bxn = 1e9, bxx = -1e9, byn = 1e9, byx = -1e9;
  conn.forEach(id => { const p = positions[id]; bxn = Math.min(bxn, p.x); bxx = Math.max(bxx, p.x + W); byn = Math.min(byn, p.y); byx = Math.max(byx, p.y + H); });
  const placed = conn.slice();
  const freeAt = (x, y) => placed.every(id => { const p = positions[id]; return !(x < p.x + W + GX && p.x < x + W + GX && y < p.y + H + GY && p.y < y + H + GY); });
  let fb = 0;
  iso.forEach(id => {
    let best = null;
    for (let y = byn; y <= byx - H && !best; y += STEP) {
      for (let x = bxn; x <= bxx - W; x += STEP) { if (freeAt(x, y)) { best = { x, y }; break; } }
    }
    if (!best) { best = { x: bxn + (fb % 3) * (W + 40), y: byx + 60 + Math.floor(fb / 3) * (H + 30) }; fb++; }
    positions[id] = { x: best.x, y: best.y }; placed.push(id);
  });
}

// ---- layout persistence (per project + schema signature) ----
function layoutKey() {
  const proj = (DATA && DATA.meta && DATA.meta.project) || 'default';
  const sig = DATA.tables.map(t => t.id).sort().join(',');
  let h = 0;
  for (let i = 0; i < sig.length; i++) h = (Math.imul(h, 31) + sig.charCodeAt(i)) | 0;
  return 'flatbase.layout.' + proj + '.' + (h >>> 0).toString(36);
}
function loadPositions() {
  try {
    const raw = localStorage.getItem(layoutKey());
    if (!raw) return false;
    const saved = JSON.parse(raw);
    if (DATA.tables.every(t => saved[t.id] && typeof saved[t.id].x === 'number')) {
      positions = {};
      DATA.tables.forEach(t => { positions[t.id] = { x: saved[t.id].x, y: saved[t.id].y }; });
      return true;
    }
  } catch {}
  return false;
}
function saveLayout() {
  try { localStorage.setItem(layoutKey(), JSON.stringify(positions)); } catch {}
}
// Load-or-compute wrapper. Saved layouts survive reloads; a schema change
// (different sorted-id signature) invalidates them via layoutKey().
function applyLayout() {
  if (loadPositions()) return;
  computePositions();
  saveLayout();
}

function computeAnchors(fromPos, toPos) {
  const fcx = fromPos.x + NODE_W / 2;
  const fcy = fromPos.y + NODE_H / 2;
  const tcx = toPos.x   + NODE_W / 2;
  const tcy = toPos.y   + NODE_H / 2;
  const dx = tcx - fcx;
  const dy = tcy - fcy;

  let fromAnchor, toAnchor;
  if (Math.abs(dx) >= Math.abs(dy)) {
    if (dx >= 0) {
      fromAnchor = { x: fromPos.x + NODE_W, y: fcy, side: 'right' };
      toAnchor   = { x: toPos.x,            y: tcy, side: 'left'  };
    } else {
      fromAnchor = { x: fromPos.x,          y: fcy, side: 'left'  };
      toAnchor   = { x: toPos.x + NODE_W,   y: tcy, side: 'right' };
    }
  } else {
    if (dy >= 0) {
      fromAnchor = { x: fcx, y: fromPos.y + NODE_H, side: 'bottom' };
      toAnchor   = { x: tcx, y: toPos.y,            side: 'top'    };
    } else {
      fromAnchor = { x: fcx, y: fromPos.y,          side: 'top'    };
      toAnchor   = { x: tcx, y: toPos.y + NODE_H,   side: 'bottom' };
    }
  }
  return { from: fromAnchor, to: toAnchor };
}

function renderNodes() {
  const layer = document.getElementById('node-layer');
  layer.textContent = '';

  for (const t of DATA.tables) {
    const pos = positions[t.id];
    if (!pos) continue;

    const color = DOMAIN_COLORS[t.domain] || '#999';
    const isHidden = hiddenNodes.has(t.id) || cascadeHiddenNodes.has(t.id) || hiddenDomains.has(t.domain) || !matchesProposedFilter(t);
    const isHighlighted = highlightedNode === t.id;

    const isArbIgnored = !!(t.proposed && tableArb(t.id).ignore);

    // Node is a translated group; all child geometry is LOCAL to the node's
    // top-left (0,0), so drag (later package) is a transform-only update.
    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    g.classList.add('node');
    if (isHidden) g.classList.add('hidden');
    if (isHighlighted) g.classList.add('highlighted');
    if (isArbIgnored) g.classList.add('arb-ignored');
    g.dataset.id = t.id;
    g.setAttribute('transform', `translate(${pos.x},${pos.y})`);

    if (t.notes) {
      const title = document.createElementNS('http://www.w3.org/2000/svg', 'title');
      title.textContent = t.notes;
      g.appendChild(title);
    }

    const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    rect.setAttribute('x', 0);
    rect.setAttribute('y', 0);
    rect.setAttribute('width', NODE_W);
    rect.setAttribute('height', NODE_H);
    rect.setAttribute('rx', 6);
    rect.setAttribute('fill', color + '22');
    rect.setAttribute('stroke', color);
    rect.setAttribute('stroke-width', isHighlighted ? 3 : 1.5);
    if (!t.modeled) rect.setAttribute('stroke-dasharray', '5,3');
    if (t.proposed) {
      rect.setAttribute('stroke', '#8b5cf6');          // violet, overrides domain color
      rect.setAttribute('stroke-dasharray', '5,3');
    }
    g.appendChild(rect);

    const textEN = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    textEN.setAttribute('x', 10);
    textEN.setAttribute('y', 20);
    textEN.setAttribute('font-size', '12');
    textEN.setAttribute('font-weight', '700');
    textEN.setAttribute('fill', '#1a1a2e');
    textEN.textContent = t.name;
    g.appendChild(textEN);

    const textJA = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    textJA.setAttribute('x', 10);
    textJA.setAttribute('y', 36);
    textJA.setAttribute('font-size', '10');
    textJA.setAttribute('fill', '#666');
    textJA.textContent = t.name_ja;
    g.appendChild(textJA);

    const badgeRect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    badgeRect.setAttribute('x', 10);
    badgeRect.setAttribute('y', 46);
    badgeRect.setAttribute('width', 70);
    badgeRect.setAttribute('height', 16);
    badgeRect.setAttribute('rx', 3);
    badgeRect.setAttribute('fill', color + '44');
    g.appendChild(badgeRect);

    const badgeText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    badgeText.setAttribute('x', 45);
    badgeText.setAttribute('y', 58);
    badgeText.setAttribute('font-size', '9');
    badgeText.setAttribute('font-weight', '600');
    badgeText.setAttribute('text-anchor', 'middle');
    badgeText.setAttribute('fill', color);
    badgeText.textContent = t.type;
    g.appendChild(badgeText);

    const nodeTags = tableTags(t);
    if (nodeTags.length && !t.proposed) {
      const tg = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      tg.setAttribute('x', NODE_W - 8);
      tg.setAttribute('y', 58);
      tg.setAttribute('font-size', '9');
      tg.setAttribute('text-anchor', 'end');
      tg.setAttribute('fill', '#718096');
      let label = nodeTags.map(s => '#' + s).join(' ');
      if (label.length > 18) label = label.slice(0, 17) + '…';
      tg.textContent = label;
      g.appendChild(tg);
    }
    if (t.proposed) {
      const pl = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      // Right of the type badge (x+10..x+80); tags are skipped on proposed nodes to avoid overlap.
      pl.setAttribute('x', 86);
      pl.setAttribute('y', 58);
      pl.setAttribute('font-size', '9');
      pl.setAttribute('fill', '#5b21b6');
      pl.textContent = isArbIgnored ? 'ignored' : 'proposed';
      g.appendChild(pl);
    }

    // Left-drag repositions the node; a plain click (no 4px movement) focuses it
    // and opens the detail panel without recentering (the user is already
    // looking at it). A pan gesture (space/right-drag) that emits a click is
    // swallowed by the capture-phase guard in initViewport().
    g.addEventListener('pointerdown', (ev) => startNodeDrag(ev, t.id));
    g.addEventListener('click', (ev) => {
      if (spaceDown) return;
      ev.stopPropagation();            // don't let the background-click clear focus
      focusNode(t.id);
      openDetailPanel(t.id);
    });
    g.addEventListener('mouseenter', () => setHoveredNode(t.id));
    g.addEventListener('mouseleave', () => setHoveredNode(null));

    layer.appendChild(g);
  }
}

function setupDefs() {
  const defs = document.getElementById('svg-defs');

  marker.setAttribute('id', 'arrow');
