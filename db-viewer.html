function findFKCol(childTableId, parentTableId, labelHint) {
  const child = DATA.tables.find(t => t.id === childTableId);
  if (!child || !Array.isArray(child.columns)) return null;
  const matches = [];
  for (const col of child.columns) {
    if (!col || typeof col !== 'object') continue;
    const fkTarget = typeof col.fk === 'string' ? col.fk : (col.fk && col.fk.table);
    if (fkTarget === parentTableId) matches.push(col);
  }
  if (matches.length === 0) return null;
  if (labelHint) {
    const hit = matches.find(c => c.name === labelHint);
    if (hit) return hit;
  }
  return matches[0];
}

function cardinalityFor(edge) {
  switch (edge.type) {
    case 'has_many': {
      const fk = findFKCol(edge.to, edge.from, edge.label);
      const min = fk && fk.nullable === false ? 1 : 0;
      return { from: '(0,n)', to: `(${min},1)` };
    }
    case 'has_one': {
      const fk = findFKCol(edge.to, edge.from, edge.label);
      const min = fk && fk.nullable === false ? 1 : 0;
      return { from: '(0,1)', to: `(${min},1)` };
    }
    case 'extends':
      return { from: '(0,1)', to: '(1,1)' };
    case 'many_to_many':
      return { from: '(0,n)', to: '(0,n)' };
    case 'polymorphic': {
      const owner = DATA.tables.find(t => t.id === edge.from);
      let min = 1;
      if (owner && Array.isArray(owner.columns)) {
        const col = owner.columns.find(c => c && typeof c === 'object' && c.polymorphic && c.name === edge.label);
        if (col && col.nullable === true) min = 0;
      }
      return { from: '(0,n)', to: `(${min},1)` };
    }
    default:
      return null;
  }
}

// Crow's-foot end markers (always-visible cardinality syntax), separate from the
// hover-only cardinalityFor() badge text. The fork ("many") sits at the FK-holding
// entity; the tick ("one") at the referenced entity. has_many is emitted parent→child
// (from = parent/one, to = child/many, the FK holder). extends / polymorphic keep their
// arrowhead + dash treatment (null here); belongs_to is never drawn (filtered upstream).
function endMarkersFor(edge) {
  switch (edge.type) {
    case 'has_many':     return { from: 'tick', to: 'fork' };
    case 'has_one':      return { from: 'tick', to: 'tick' };
    case 'many_to_many': return { from: 'fork', to: 'fork' };
    default:             return null;
  }
}

// Outward normal of the box side an anchor sits on (the direction the edge leaves).
function outNormal(side) {
  return side === 'right' ? [1, 0]
    : side === 'left' ? [-1, 0]
    : side === 'top' ? [0, -1]
    : [0, 1];
}

// Crow's-foot depth: distance from the box edge to the fork apex (the 3-prong
// convergence point that sits on the line). Tuned for the 190×72 nodes.
const FORK_D = 11;

// Stroked end-mark at an anchor. fork = 3 prongs on the box edge converging to an
// apex FORK_D out along the line; tick = one short stroke perpendicular to the line.
// n = outward normal of the side the edge leaves from; (px,py) = its perpendicular.
function cardMark(x, y, side, kind) {
  const n = outNormal(side), px = -n[1], py = n[0];
  if (kind === 'fork') {
    const S = 6, ax = x + n[0] * FORK_D, ay = y + n[1] * FORK_D;
    return `M ${ax} ${ay} L ${x} ${y} M ${ax} ${ay} L ${x + px * S} ${y + py * S} M ${ax} ${ay} L ${x - px * S} ${y - py * S}`;
  }
  const T = 6, S = 6, cx = x + n[0] * T, cy = y + n[1] * T;
  return `M ${cx + px * S} ${cy + py * S} L ${cx - px * S} ${cy - py * S}`;
}

// Where the visible line should end at a fork ("many") end: pulled FORK_D/2 out
// along the normal so the fork's apex reads cleanly. Tick ends stay at the box.
function lineEndPoint(x, y, side, many) {
  if (!many) return { x, y };
  const n = outNormal(side), d = FORK_D / 2;
  return { x: x + n[0] * d, y: y + n[1] * d };
}

// A stroked end-marker path element — inherits the edge stroke colour, never dashed.
function makeEdgeMarker(end, color) {
  const m = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  m.setAttribute('class', 'edge-marker');
  m.dataset.end = end;
  m.setAttribute('fill', 'none');
  m.setAttribute('stroke', color);
  m.setAttribute('stroke-width', '1.5');
  m.setAttribute('stroke-dasharray', 'none');
  return m;
}

// Set the geometry of one edge group's paths in place from a pre-computed edgeGeometry.
// Shared by renderEdges (initial) and redrawIncidentEdges (drag): the visible line is
// trimmed at fork ends, the wide hit path stays full-length, and each crow's-foot marker
// is repainted by class so a drag never stamps the edge path onto a marker.
function applyEdgePaths(g, edge, geo) {
  const { x1, y1, x2, y2, cx1, cy1, cx2, cy2, fromSide, toSide, isSelf } = geo;
  const marks = isSelf ? null : endMarkersFor(edge);
  let lineD = geo.d;
  if (marks) {
    const aMany = marks.from === 'fork', bMany = marks.to === 'fork';
    if (aMany || bMany) {
      const a = lineEndPoint(x1, y1, fromSide, aMany);
      const b = lineEndPoint(x2, y2, toSide, bMany);
      lineD = `M ${a.x} ${a.y} C ${cx1} ${cy1}, ${cx2} ${cy2}, ${b.x} ${b.y}`;
    }
  }
  const line = g.querySelector('path.edge-line');
  if (line) line.setAttribute('d', lineD);
  const hit = g.querySelector('path.hit-path');
  if (hit) hit.setAttribute('d', geo.d);
  const mFrom = g.querySelector('.edge-marker[data-end="from"]');
  if (mFrom) mFrom.setAttribute('d', marks && marks.from ? cardMark(x1, y1, fromSide, marks.from) : '');
  const mTo = g.querySelector('.edge-marker[data-end="to"]');
  if (mTo) mTo.setAttribute('d', marks && marks.to ? cardMark(x2, y2, toSide, marks.to) : '');
}

function cardinalityLabelOffset(side, dist) {
  switch (side) {
    case 'right':  return { dx: dist,      dy: -4, anchor: 'start' };
    case 'left':   return { dx: -dist,     dy: -4, anchor: 'end'   };
    case 'top':    return { dx: 0,         dy: -dist, anchor: 'middle' };
    case 'bottom': return { dx: 0,         dy: dist + 10, anchor: 'middle' };
  }
  return { dx: 0, dy: 0, anchor: 'middle' };
}

function appendCardinalityBadge(parent, cx, cy, textAnchor, text) {
  // White rounded background + readable text — placed so it stays legible when crammed
  // between two close tables.
  const FONT = 11;
  const charW = 6.4;
  const padX = 4;
  const padY = 2;
  const w = text.length * charW + padX * 2;
  const h = FONT + padY * 2;
  let x = cx;
  if (textAnchor === 'middle') x = cx - w / 2;
  else if (textAnchor === 'end') x = cx - w;
  const y = cy - h + padY + 2;

  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('class', 'cardinality-bg');
  rect.setAttribute('x', x);
  rect.setAttribute('y', y);
  rect.setAttribute('width', w);
  rect.setAttribute('height', h);
  rect.setAttribute('rx', 3);
  parent.appendChild(rect);

  const t = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  t.setAttribute('class', 'cardinality');
  t.setAttribute('x', cx);
  t.setAttribute('y', cy);
  t.setAttribute('font-size', FONT);
  t.setAttribute('font-weight', '600');
  t.setAttribute('text-anchor', textAnchor);
  t.textContent = text;
  parent.appendChild(t);
}

function collectEdges() {
  const seen = new Set();
  const edges = [];
  for (const table of DATA.tables) {
    for (const rel of (table.relations || [])) {
      // Skip belongs_to — it's the inverse of has_many/has_one/extends on the parent
      if (rel.type === 'belongs_to') continue;
      const targets = rel.targets
        ? rel.targets.filter(t => t !== '*')
        : rel.target ? [rel.target] : [];
      for (const target of targets) {
        const key = [table.id, target].sort().join('|') + '|' + rel.type;
        if (seen.has(key)) continue;
        seen.add(key);
        edges.push({
          from: table.id,
          to: target,
          type: rel.type,
          label: rel.label || rel.type,
          proposed: !!rel.proposed,
          via: rel.via,
          viaTable: rel.viaTable,
        });
      }
    }
  }
  return edges;
}

// Pure geometry of one edge from the current node positions. Extracted so a
// node drag can recompute only its incident edges (transform-only redraw)
// without a full renderEdges() pass.
function edgeGeometry(edge) {
  const fromPos = positions[edge.from];
  const toPos = positions[edge.to];
  const isSelf = edge.from === edge.to;

  let x1, y1, x2, y2, cx1, cy1, cx2, cy2;
  let fromSide = null, toSide = null;
  const CTL = 60;
  if (isSelf) {
    // Self-relation: draw a small loop bulging out to the right of the node.
    const right = fromPos.x + NODE_W;
    const yTop = fromPos.y + NODE_H * 0.3;
    const yBot = fromPos.y + NODE_H * 0.7;
    x1 = right; y1 = yTop;
    x2 = right; y2 = yBot;
    const LOOP_OUT = 70;
    const LOOP_FLARE = 30;
    cx1 = right + LOOP_OUT; cy1 = yTop - LOOP_FLARE;
    cx2 = right + LOOP_OUT; cy2 = yBot + LOOP_FLARE;
    fromSide = 'right'; toSide = 'right';
  } else {
    const { from: a, to: b } = computeAnchors(fromPos, toPos);
    x1 = a.x; y1 = a.y;
    x2 = b.x; y2 = b.y;
    fromSide = a.side; toSide = b.side;

    cx1 = x1; cy1 = y1; cx2 = x2; cy2 = y2;
    if (a.side === 'right')  cx1 = x1 + CTL;
    if (a.side === 'left')   cx1 = x1 - CTL;
    if (a.side === 'top')    cy1 = y1 - CTL;
    if (a.side === 'bottom') cy1 = y1 + CTL;
    if (b.side === 'right')  cx2 = x2 + CTL;
    if (b.side === 'left')   cx2 = x2 - CTL;
    if (b.side === 'top')    cy2 = y2 - CTL;
    if (b.side === 'bottom') cy2 = y2 + CTL;
  }

  const d = `M ${x1} ${y1} C ${cx1} ${cy1}, ${cx2} ${cy2}, ${x2} ${y2}`;
  return { d, x1, y1, x2, y2, cx1, cy1, cx2, cy2, fromSide, toSide, isSelf };
}

// Recompute the path `d` of every edge incident to `id` in place — used mid-drag
// so the node moves with its edges without a full render(). Labels/cardinality
// badges (hover-only, positioned) are left stale until the drop full-render.
function redrawIncidentEdges(id) {
  const layer = document.getElementById('edge-layer');
  if (!layer) return;
  layer.querySelectorAll('.edge').forEach(g => {
    if (g.dataset.from !== id && g.dataset.to !== id) return;
    if (!g.__edge) return;
    applyEdgePaths(g, g.__edge, edgeGeometry(g.__edge));
  });
}

function renderEdges(visibleIds) {
  const layer = document.getElementById('edge-layer');
  layer.textContent = '';

  const visible = new Set(visibleIds);
  const edges = collectEdges();

  for (const edge of edges) {
    if (!positions[edge.from] || !positions[edge.to]) continue;
    const bothVisible = visible.has(edge.from) && visible.has(edge.to);
    // An edge is dropped from view when its carrying FK column is arb-ignored, or when
    // either endpoint is an arb-ignored proposed table.
    const tableIgnored = id => { const t = DATA.tables.find(x => x.id === id); return !!(t && t.proposed && tableArb(id).ignore); };
    const arbSuppressed =
      (edge.via && edge.viaTable && colArb(edge.viaTable, edge.via).ignore) ||
      tableIgnored(edge.from) || tableIgnored(edge.to);

    const geo = edgeGeometry(edge);
    const { x1, y1, x2, y2, cx1, cx2, fromSide, toSide, isSelf } = geo;

    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    g.classList.add('edge');
    g.dataset.from = edge.from;
    g.dataset.to = edge.to;
    g.__edge = edge;            // edge index: element → edge (for incident redraw)
    if (!bothVisible || arbSuppressed) g.classList.add('hidden');

    const d = geo.d;
    const hit = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    hit.setAttribute('d', d);
    hit.setAttribute('class', 'hit-path');
    hit.setAttribute('stroke-width', '14');
    // Proposed edges match the proposed-node treatment: violet (+ dash on the line).
    const strokeColor = edge.proposed ? '#8b5cf6' : '#bbb';
    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('class', 'edge-line');
    path.setAttribute('d', d);
    path.setAttribute('fill', 'none');
    path.setAttribute('stroke', strokeColor);
    path.setAttribute('stroke-width', '1.5');

    // Converted types (has_many / has_one / many_to_many) carry always-visible
    // crow's-foot end marks instead of an SVG <marker> arrowhead (so proposed
    // edges inherit violet naturally). extends / polymorphic keep their arrow + dash.
    const marks = isSelf ? null : endMarkersFor(edge);
    if (marks) {
      // no marker-end: the crow's-feet below carry the cardinality
    } else if (edge.type === 'extends') {
      path.setAttribute('stroke-dasharray', '6,3');
      path.setAttribute('marker-end', 'url(#arrow)');
    } else if (edge.type === 'polymorphic') {
      path.setAttribute('stroke-dasharray', '2,3');
      path.setAttribute('marker-end', 'url(#arrow)');
    } else {
      // self-referential converted types (marks suppressed) + any fallback keep an arrow
      path.setAttribute('marker-end', 'url(#arrow)');
    }

    if (edge.proposed) {
      path.setAttribute('stroke-dasharray', '5,3');
    }

    g.appendChild(path);
    if (marks) {
      // Crow's-foot marks: stroked end geometry, edge stroke colour, never dashed.
      if (marks.from) g.appendChild(makeEdgeMarker('from', strokeColor));
      if (marks.to)   g.appendChild(makeEdgeMarker('to', strokeColor));
    }
    g.appendChild(hit); // last so the wide invisible stroke is on top for hit testing

    // Trim the visible line at fork ends + paint the marks from the shared geometry.
    applyEdgePaths(g, edge, geo);

    const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    if (isSelf) {
      // Anchor near the bulge of the loop, slightly to the right of the node.
      label.setAttribute('x', Math.max(cx1, cx2) + 4);
      label.setAttribute('y', (y1 + y2) / 2 + 3);
      label.setAttribute('text-anchor', 'start');
    } else {
      label.setAttribute('x', (x1 + x2) / 2);
      label.setAttribute('y', (y1 + y2) / 2 - 4);
      label.setAttribute('text-anchor', 'middle');
    }
    label.setAttribute('font-size', '9');
    label.setAttribute('fill', edge.proposed ? '#8b5cf6' : '#999');
    label.textContent = edge.label;
    g.appendChild(label);

    if (!isSelf) {
      const card = cardinalityFor(edge);
      if (card) {
        const fo = cardinalityLabelOffset(fromSide, 20);
        const to_ = cardinalityLabelOffset(toSide, 20);
        appendCardinalityBadge(g, x1 + fo.dx, y1 + fo.dy, fo.anchor, card.from);
        appendCardinalityBadge(g, x2 + to_.dx, y2 + to_.dy, to_.anchor, card.to);
      }
    }

    // Edge click focuses its two endpoints + itself. The wide transparent
    // hit-path carries the pointer-events; stopPropagation keeps the background
    // click (clearFocus) from firing.
    g.addEventListener('click', (ev) => {
      if (spaceDown || panMoved) return;
      ev.stopPropagation();
      focusEdge(edge);
    });

    // Z-order is structural: edge-layer sits before node-layer in the DOM, so
    // edges always render under nodes — just append.
    layer.appendChild(g);
  }
}

function getVisibleIds() {
  return DATA.tables
    .filter(t => !hiddenDomains.has(t.domain) && !hiddenNodes.has(t.id) && !cascadeHiddenNodes.has(t.id) && matchesProposedFilter(t))
    .map(t => t.id);
}

function recomputeCascade() {
  const visible = new Set(
    DATA.tables
      .filter(t => !hiddenDomains.has(t.domain) && !hiddenNodes.has(t.id))
      .map(t => t.id)
  );
  let changed = true;
  while (changed) {
    changed = false;
    for (const t of DATA.tables) {
      if (!visible.has(t.id)) continue;
      const neighbors = getNeighbors(t.id);
      if (neighbors.length > 0 && neighbors.every(n => !visible.has(n))) {
        visible.delete(t.id);
        cascadeHiddenNodes.add(t.id);
        changed = true;
      }
    }
  }
}

function cascadeHide(id) {
  hiddenNodes.add(id);
  cascadeHiddenNodes.clear();
  recomputeCascade();
}

function toggleNodeVisibility(id) {
  if (hiddenNodes.has(id)) {
    hiddenNodes.delete(id);
    cascadeHiddenNodes.clear();
    recomputeCascade();
    render();
    return;
  }
  if (cascadeHiddenNodes.has(id)) {
    cascadeHiddenNodes.delete(id);
    render();
    return;
  }
  hiddenNodes.add(id);
  cascadeHiddenNodes.clear();
  recomputeCascade();
  render();
}

// Build the inverse relations map once at init
let inverseRelations = {}; // { [targetId]: [{ from, type, label }, ...] }

function buildInverseRelations() {
  inverseRelations = {};
  for (const table of DATA.tables) {
    for (const rel of (table.relations || [])) {
      const targets = rel.targets
        ? rel.targets.filter(t => t !== '*')
        : (rel.target ? [rel.target] : []);
      for (const tgt of targets) {
        if (!inverseRelations[tgt]) inverseRelations[tgt] = [];
        inverseRelations[tgt].push({ from: table.id, type: rel.type, label: rel.label });
      }
    }
  }
}

let openPanelId = null;

function escapeHtml(s) {
  return String(s ?? '')
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function openDetailPanel(id, opts) {
  const table = DATA.tables.find(t => t.id === id);
  if (!table) return;
  const center = !!(opts && opts.center);   // recenter ONLY on intentional navigation
  openPanelId = id;
  highlightedNode = id;

  const panel = document.getElementById('detail-panel');
  panel.classList.remove('closed');
  document.getElementById('detail-name-en').textContent = table.name;

  const color = DOMAIN_COLORS[table.domain] || '#999';
  const body = document.getElementById('detail-body');

  const tableById = Object.fromEntries(DATA.tables.map(t => [t.id, t]));

  // Outgoing — polymorphic relations are collapsed into one grouped row.
  const outgoing = [];
  for (const rel of (table.relations || [])) {
    if (rel.type === 'polymorphic') {
      const raw = rel.targets || [];
      const hasWildcard = raw.includes('*');
      const targets = raw.filter(t => t !== '*' && tableById[t]);
      if (targets.length === 0 && !hasWildcard) continue;
      outgoing.push({ poly: true, type: 'polymorphic', label: rel.label, targets, hasWildcard });
    } else {
      const targets = rel.targets
        ? rel.targets.filter(t => t !== '*')
        : (rel.target ? [rel.target] : []);
      for (const tgt of targets) outgoing.push({ poly: false, to: tgt, type: rel.type, label: rel.label });
    }
  }
  const incoming = inverseRelations[id] || [];

  // Enums shown on the table that owns them (`_home`) or references them (enum_ref).
  // Proposed AND defined — only proposed ones are arbitrable.
  const colObjs = (table.columns || []).map(col => typeof col === 'string' ? { name: col } : col);
  const panelEnums = (DATA.enums || []).filter(e =>
    e._home === id || colObjs.some(c => c.enum_ref === e.id));

  function relRow(rel, isOutgoing) {
    if (rel.poly) {
      const wildcardChip = rel.hasWildcard
        ? `<span class="rel-chip rel-chip-wildcard" title="targets any table">any</span>`
        : '';
      const chips = rel.targets.map(tgt => {
        const name = tableById[tgt] ? tableById[tgt].name : tgt;
        return `<span class="rel-chip navigable" data-target="${escapeHtml(tgt)}">${escapeHtml(name)}</span>`;
      }).join('');
      const hasNavigableTargets = rel.targets.length > 0;
      const bundleAttr = hasNavigableTargets
        ? ` data-bundle-targets="${escapeHtml(rel.targets.join(','))}"`
        : '';
      const cls = hasNavigableTargets ? ' detail-relation-bundle' : '';
      return `
        <div class="detail-relation poly${cls}"${bundleAttr}>
          <span class="rel-type">polymorphic</span>
          <span class="rel-poly-label">${escapeHtml(rel.label || '')}</span>
          →
          <span class="rel-chips">${chips}${wildcardChip}</span>
        </div>
      `;
    }
    const other = isOutgoing ? rel.to : rel.from;
    const otherTable = tableById[other];
    const otherName = otherTable ? otherTable.name : other;
    const labelHtml = rel.label
      ? `<span class="rel-label">"${escapeHtml(rel.label)}"</span>`
      : '';
    const navAttr = otherTable ? ` data-target="${escapeHtml(other)}"` : '';
    // Reading direction follows the relation's actual subject:
    //   outgoing: "this [type] → {other}"   → we [type] them
    //   incoming: "{other} [type] → this"   → they [type] us
    const typeSpan = `<span class="rel-type">${escapeHtml(rel.type)}</span>`;
    const otherSpan = `<span class="rel-target">${escapeHtml(otherName)}</span>`;
    const selfSpan = `<span class="rel-self">this</span>`;
    const body = isOutgoing
      ? `${selfSpan} ${typeSpan} → ${otherSpan} ${labelHtml}`
      : `${otherSpan} ${typeSpan} → ${selfSpan} ${labelHtml}`;
    return `
      <div class="detail-relation${otherTable ? ' navigable' : ''}"${navAttr}>
        ${body}
      </div>
    `;
  }

  body.innerHTML = `
    <div class="detail-section">
      <div class="detail-section-title">Japanese name</div>
      <div>${escapeHtml(table.name_ja || '')}</div>
    </div>

    <div class="detail-section">
      <div class="detail-section-title">Metadata</div>
      <div class="detail-meta-row">
        <span class="detail-badge" style="background:${color}">${escapeHtml(table.domain)}</span>
        <span class="detail-badge" style="background:#718096">${escapeHtml(table.type)}</span>
        ${tableTags(table).map(tag => `<span class="badge tag">#${escapeHtml(tag)}</span>`).join('')}
        ${table.proposed ? `
          <span class="badge proposed">proposed</span>
          <button class="arb-btn${tableArb(id).ignore ? ' on' : ''}" data-arb="ignore-table">ignore table</button>
        ` : ''}
      </div>
      ${table.proposed && (table._evidence || table._provenance) ? `
        <div class="detail-evidence">evidence: ${escapeHtml(table._evidence || '—')} · provenance: ${escapeHtml(table._provenance || 'design')}</div>
      ` : ''}
      ${table.proposed && tableArb(id).ignore ? `
        <div class="detail-arb-note">ignored — this table will be dropped from the arbitrated export</div>
      ` : ''}
    </div>

    ${table.notes ? `
      <div class="detail-section">
        <div class="detail-section-title">Notes</div>
        <div class="detail-notes">${escapeHtml(table.notes)}</div>
      </div>
    ` : ''}

    ${Array.isArray(table.columns) && table.columns.length ? `
      <div class="detail-section">
        <div class="detail-section-title">Columns (${table.columns.length})</div>
        <table class="detail-columns">
          <thead><tr><th>Name</th><th>Type</th><th></th></tr></thead>
          <tbody>
            ${table.columns.map(col => {
              const c = typeof col === 'string' ? { name: col } : col;
              const fkTarget = c.fk && (typeof c.fk === 'string' ? c.fk : c.fk.table);
              const arb = colArb(id, c.name);
              const effType = (arb.type != null ? arb.type : (c.type || ''));
              const refEnum = c.enum_ref && (DATA.enums || []).find(e => e.id === c.enum_ref);
              const flags = [];
              if (c.pk) flags.push('<span class="col-flag pk" title="primary key">PK</span>');
              if (fkTarget) flags.push(`<span class="col-flag fk" title="references ${escapeHtml(fkTarget)}">FK→${escapeHtml(fkTarget)}</span>`);
              if (c.nullable === false) flags.push('<span class="col-flag nn" title="NOT NULL">NN</span>');
              if (c.unique) flags.push('<span class="col-flag" title="unique">U</span>');
              if (c.enum_ref) {
                if (refEnum && refEnum.proposed) flags.push(`<span class="col-flag proposed" title="references proposed enum">enum→${escapeHtml(refEnum.id)} (proposed)</span>`);
                else if (refEnum) flags.push(`<span class="col-flag" title="references enum">enum→${escapeHtml(refEnum.id)}</span>`);
                else flags.push(`<span class="col-flag enum-gap" title="enum_ref resolves to no enums[] entry (lattice gap)">enum→${escapeHtml(c.enum_ref)} (undefined)</span>`);
              }
              if (c.status === 'inferred') flags.push('<span class="col-flag inferred" title="derived from the id/FK convention, not an operator-confirmed atom">inferred</span>');
              if (c.proposed) {
                flags.push('<span class="col-flag proposed">proposed</span>');
                flags.push(`<button class="arb-btn${arb.ignore ? ' on' : ''}" data-arb="ignore" data-col="${escapeHtml(c.name)}">ignore</button>`);
                flags.push(`<button class="arb-btn${arb.type != null ? ' on' : ''}" data-arb="overrule" data-col="${escapeHtml(c.name)}">overrule</button>`);
              }
              const rowCls = [];
              if (fkTarget && tableById[fkTarget]) rowCls.push('navigable');
              if (arb.ignore) rowCls.push('arb-ignored');
              if (c.status === 'inferred') rowCls.push('col-inferred');
              const clsAttr = rowCls.length ? ` class="${rowCls.join(' ')}"` : '';
              const tgtAttr = fkTarget && tableById[fkTarget] ? ` data-target="${escapeHtml(fkTarget)}"` : '';
              return `
                <tr${clsAttr}${tgtAttr}>
                  <td class="col-name">${escapeHtml(c.name)}</td>
                  <td class="col-type">${escapeHtml(effType)}</td>
                  <td class="col-flags">${flags.join('')}</td>
                </tr>
                ${c.notes ? `<tr><td colspan="3" class="col-notes">${escapeHtml(c.notes)}</td></tr>` : ''}
                ${c.proposed && (c._evidence || c._provenance) ? `<tr><td colspan="3" class="col-evidence">evidence: ${escapeHtml(c._evidence || '—')} · provenance: ${escapeHtml(c._provenance || 'design')}</td></tr>` : ''}
              `;
            }).join('')}
          </tbody>
        </table>
      </div>
    ` : ''}

    ${panelEnums.length ? `
      <div class="detail-section">
        <div class="detail-section-title">Enums (${panelEnums.length})</div>
        <table class="detail-columns">
          <tbody>
            ${panelEnums.map(en => {
              const values = (en.values || []).map(v =>
                typeof v === 'string' ? v : (v.label || v.label_ja ? v.code + '=' + (v.label || v.label_ja) : v.code)
              ).join(', ');
              const ignored = en.proposed && enumArb(en.id).ignore;
              const rowCls = [];
              if (ignored) rowCls.push('arb-ignored');
              if (en.status === 'inferred') rowCls.push('col-inferred');
              const enFlags = [];
              if (en.proposed) {
                enFlags.push('<span class="col-flag proposed">proposed</span>');
                enFlags.push(`<button class="arb-btn${ignored ? ' on' : ''}" data-arb="ignore-enum" data-enum="${escapeHtml(en.id)}">ignore</button>`);
              } else if (en.status === 'inferred') {
                enFlags.push('<span class="col-flag inferred" title="derived by convention, not an operator-confirmed atom">inferred</span>');
              }
              return `
                <tr${rowCls.length ? ` class="${rowCls.join(' ')}"` : ''}>
                  <td class="col-name">${escapeHtml(en.id)}</td>
                  <td class="col-type">${escapeHtml(values)}</td>
                  <td class="col-flags">${enFlags.join('')}</td>
                </tr>
                ${en._evidence || en._provenance ? `<tr><td colspan="3" class="col-evidence">evidence: ${escapeHtml(en._evidence || '—')} · provenance: ${escapeHtml(en._provenance || 'design')}</td></tr>` : ''}
              `;
            }).join('')}
          </tbody>
        </table>
      </div>
    ` : ''}

    <div class="detail-section">
      <div class="detail-section-title">References (${outgoing.length})</div>
      ${outgoing.length ? outgoing.map(r => relRow(r, true)).join('') : '<div style="color:#a0aec0;font-style:italic">No outgoing relations.</div>'}
    </div>

    <div class="detail-section">
      <div class="detail-section-title">Referenced by (${incoming.length})</div>
      ${incoming.length ? incoming.map(r => relRow(r, false)).join('') : '<div style="color:#a0aec0;font-style:italic">Not referenced by other tables.</div>'}
    </div>

    <button id="detail-hide-btn"></button>
  `;

  // Wire arbitration controls (proposal mode): per-column ignore/overrule,
  // whole-table ignore, per-enum ignore.
  body.querySelectorAll('.arb-btn').forEach(btn => btn.addEventListener('click', (e) => {
    e.stopPropagation();                       // don't trigger row navigation
    const kind = btn.dataset.arb;
    if (kind === 'ignore-table') {
      setArb('table::' + id, cur => { if (cur.ignore) delete cur.ignore; else cur.ignore = true; });
    } else if (kind === 'ignore-enum') {
      setArb('enum::' + btn.dataset.enum, cur => { if (cur.ignore) delete cur.ignore; else cur.ignore = true; });
    } else {
      const col = btn.dataset.col;
      if (kind === 'ignore') {
        setArb(id + '::' + col, cur => { if (cur.ignore) delete cur.ignore; else cur.ignore = true; });
      } else {
        const cur = colArb(id, col);
        const nt = prompt('Overrule "' + col + '" type (blank = keep original):', cur.type != null ? cur.type : '');
        if (nt === null) return;               // cancelled
        setArb(id + '::' + col, c => { if (nt.trim()) c.type = nt.trim(); else delete c.type; });
      }
    }
    openDetailPanel(id);                        // refresh the panel
  }));

  // Wire the hide button — text reflects current state
  const hideBtn = document.getElementById('detail-hide-btn');
  const isHidden = hiddenNodes.has(id) || cascadeHiddenNodes.has(id);
  if (isHidden) {
    hideBtn.textContent = 'Show this table';
    hideBtn.classList.add('is-hidden');
  } else {
    hideBtn.textContent = 'Hide this table';
    hideBtn.classList.remove('is-hidden');
  }
  hideBtn.addEventListener('click', () => {
    toggleNodeVisibility(id);
    openDetailPanel(id); // re-render panel to flip button state
  });

  // Navigable rows (relation rows + column rows with an FK) drive navigation on click
  // and preview the link in the diagram on hover over the whole row.
  body.querySelectorAll('.navigable[data-target]').forEach(el => {
    const tgt = el.dataset.target;
    if (!tableById[tgt]) return;
    el.addEventListener('click', e => { e.stopPropagation(); focusNode(tgt); openDetailPanel(tgt, { center: true }); });
    el.addEventListener('mouseenter', () => setHoveredNode(tgt, 'detail', id));
    el.addEventListener('mouseleave', () => setHoveredNode(null));
  });

  // Grouped polymorphic rows: hover the row → highlight all (anchor → target_i) edges in orange.
  body.querySelectorAll('[data-bundle-targets]').forEach(el => {
    const targets = el.dataset.bundleTargets.split(',').filter(Boolean);
    el.addEventListener('mouseenter', () => setHoveredNode(id, 'detail', targets));
    el.addEventListener('mouseleave', () => setHoveredNode(null));
  });

  // Pan-to-center the table ONLY when navigation is intentional (sidebar / FK
  // click). Same-id refreshes (arbitration buttons, hide toggle) never recenter.
  if (center) centerViewportOnNode(id);

  render();               // render() runs applyFocus() — focus emphasis is preserved
  setHoveredNode(null);   // clear any stale transient hover state
}

function closeDetailPanel() {
  document.getElementById('detail-panel').classList.add('closed');
  openPanelId = null;
  highlightedNode = null;
  focusedNode = null;   // closing the panel also exits focus (applyFocus runs in render)
  focusedEdge = null;
  render();
  setHoveredNode(null); // clears transient hover emphasis now that nothing is selected
}

function getNeighbors(id) {
  const neighbors = new Set();
  for (const t of DATA.tables) {
    for (const rel of (t.relations || [])) {
      const targets = rel.targets
        ? rel.targets.filter(x => x !== '*')
        : rel.target ? [rel.target] : [];
      if (t.id === id) {
        targets.forEach(tgt => neighbors.add(tgt));
      }
      if (targets.includes(id)) {
        neighbors.add(t.id);
      }
    }
  }
  return [...neighbors].filter(n => DATA.tables.find(t => t.id === n));
}

function renderSidebar() {
  const nav = document.getElementById('sidebar-list');
  nav.innerHTML = '';

  const byDomain = {};
  for (const d of DOMAIN_ORDER) byDomain[d] = [];
  for (const t of DATA.tables) {
    if (!byDomain[t.domain]) {
      console.warn(`Unknown domain "${t.domain}" for table "${t.id}" — not in DOMAIN_ORDER`);
      continue;
    }
    byDomain[t.domain].push(t);
  }

  let totalShown = 0;
  for (const domain of DOMAIN_ORDER) {
    const tables = byDomain[domain] || [];
    if (!tables.length) continue;

    const color = DOMAIN_COLORS[domain] || '#999';

    const shown = tables.filter(t => matchesProposedFilter(t) && matchesSearch(t));
    totalShown += shown.length;
    if (!shown.length) continue;

    const domainEl = document.createElement('div');
    domainEl.className = 'sidebar-domain';
    const label = document.createElement('div');
    label.className = 'sidebar-domain-label';
    label.style.color = color;
    const name = document.createElement('span');
    name.textContent = domain.toUpperCase();
    const count = document.createElement('span');
    count.className = 'sidebar-domain-count';
    count.textContent = shown.length === tables.length ? String(tables.length) : shown.length + '/' + tables.length;
    label.appendChild(name);
    label.appendChild(count);
    domainEl.appendChild(label);
    nav.appendChild(domainEl);

    for (const t of shown) {
      const row = document.createElement('div');
      row.className = 'sidebar-table';
      row.dataset.id = t.id;
      const isHidden = hiddenNodes.has(t.id) || cascadeHiddenNodes.has(t.id) || hiddenDomains.has(t.domain);
      if (isHidden) row.classList.add('hidden-node');
      if (highlightedNode === t.id) row.classList.add('highlighted');
      const isArbIgnored = !!(t.proposed && tableArb(t.id).ignore);
      if (isArbIgnored) row.classList.add('arb-ignored');

      const domainOff = hiddenDomains.has(t.domain);
      const userHidden = hiddenNodes.has(t.id) || cascadeHiddenNodes.has(t.id);
      const eyeChar = (userHidden || domainOff) ? '○' : '●';
      const eyeClasses = ['eye-toggle'];
      if (userHidden || domainOff) eyeClasses.push('hidden-state');
      if (domainOff) eyeClasses.push('disabled');

      row.innerHTML = `
        <button class="${eyeClasses.join(' ')}" title="Toggle visibility">${eyeChar}</button>
        <div class="row-body">
          <div class="table-name-en">${t.name}</div>
          <div class="table-name-ja">${t.name_ja || ''}</div>
          <div class="table-badges">
            <span class="badge">${t.type}</span>
            ${tableTags(t).map(tag => `<span class="badge tag">#${escapeHtml(tag)}</span>`).join('')}
            ${t.proposed ? `<span class="badge proposed">${isArbIgnored ? 'ignored' : 'proposed'}</span>` : ''}
          </div>
        </div>
      `;

      const eyeBtn = row.querySelector('.eye-toggle');
      eyeBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        if (domainOff) return;
        toggleNodeVisibility(t.id);
      });

      row.querySelector('.row-body').addEventListener('click', () => { focusNode(t.id); openDetailPanel(t.id, { center: true }); });
      row.addEventListener('mouseenter', () => setHoveredNode(t.id));
      row.addEventListener('mouseleave', () => setHoveredNode(null));
      nav.appendChild(row);
    }
  }

  const total = DATA.tables.length;
  document.getElementById('sidebar-count').textContent =
    totalShown === total ? total + ' tables' : totalShown + ' / ' + total + ' tables';
}

function renderDomainFilters() {
  const container = document.getElementById('domain-filters');
  container.innerHTML = '';

  for (const domain of DOMAIN_ORDER) {
    const color = DOMAIN_COLORS[domain] || '#999';
    const isOff = hiddenDomains.has(domain);

    const chip = document.createElement('label');
    chip.className = 'domain-chip' + (isOff ? ' off' : '');
    chip.style.background = color;
    chip.innerHTML = `<input type="checkbox" ${isOff ? '' : 'checked'}> ${domain} ` +
      `<input type="color" value="${toHex6(color)}" title="Change this domain's color">`;
    chip.querySelector('input[type="checkbox"]').addEventListener('change', (e) => {
      toggleDomain(domain, e.target.checked);
    });
    chip.querySelector('input[type="color"]').addEventListener('input', (e) => {
      setDomainColor(domain, e.target.value);
    });
    container.appendChild(chip);
  }
}

// <input type="color"> only accepts #rrggbb — expand #rgb, fall back to grey.
function toHex6(color) {
  const c = String(color || '').trim();
  if (/^#[0-9a-f]{6}$/i.test(c)) return c.toLowerCase();
  if (/^#[0-9a-f]{3}$/i.test(c)) return '#' + [...c.slice(1)].map(ch => ch + ch).join('').toLowerCase();
  return '#999999';
}

// Live domain recolor. Mutates DATA + RAW_INPUT (so ↓ Export / ↓ Proposal carry the new
// color) and re-caches the pristine input so the color survives a reload in atelier mode.
function setDomainColor(domain, color) {
  DOMAIN_COLORS[domain] = color;
  const d = (DATA.domains || []).find(x => x.id === domain);
  if (d) d.color = color;
  if (RAW_INPUT) {
    if (!Array.isArray(RAW_INPUT.domains) || !RAW_INPUT.domains.length) {
      // Domains were auto-derived: materialize them so the choice is exportable.
      RAW_INPUT.domains = DATA.domains.map(x => ({ id: x.id, color: x.color }));
    }
    const rd = RAW_INPUT.domains.find(x => x.id === domain);
    if (rd) rd.color = color;
    if (!window.__BAKED_DATA__) {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(RAW_INPUT)); } catch {}
    }
  }
  render();
}

function toggleDomain(domain, enabled) {
  if (enabled) {
    hiddenDomains.delete(domain);
  } else {
    hiddenDomains.add(domain);
  }
  // Recompute cascade-hidden set from scratch
  cascadeHiddenNodes.clear();
  recomputeCascade();
  render();
}

function render() {
  renderEdges(getVisibleIds());
  renderNodes();
  renderSidebar();
  renderDomainFilters();
  applyFocus();               // re-apply .dim/.hi to the freshly rebuilt DOM
}

function resetState() {
  hiddenNodes.clear();
  cascadeHiddenNodes.clear();
  hiddenDomains.clear();
  proposedFilter = 'all';
  const filterEl = document.getElementById('proposed-filter');
  if (filterEl) filterEl.value = 'all';
  sidebarSearch = '';
  const searchEl = document.getElementById('sidebar-search');
  if (searchEl) searchEl.value = '';
  highlightedNode = null;
  focusedNode = null;         // Reset clears focus (applyFocus runs inside the render below)
  focusedEdge = null;
  // Reset semantics: drop any saved arrangement, recompute the layout, and
  // Fit. closeDetailPanel() performs the single render; then fit the fresh graph.
  try { localStorage.removeItem(layoutKey()); } catch {}
  computePositions();
  saveLayout();
  closeDetailPanel();
  fitView();
}

function setHoveredNode(id, source, pairWith) {
  // pairWith may be a string (single-leg orange overlay) or string[] (bundle).
  // Persistent neighbourhood emphasis is owned by focus mode (applyFocus); this
  // function handles only the TRANSIENT hover state (and the detail-pane orange
  // pair overlay), so clearing hover truly clears — no fallback to the selection.
  const svg = document.getElementById('diagram');
  const isArrayPair = Array.isArray(pairWith);
  const pairTargets = pairWith == null
    ? []
    : (isArrayPair ? pairWith : [pairWith]);
  const isPair = source === 'detail' && pairTargets.length > 0 && id;
  // For single (string pairWith): id=hovered target, pairWith=anchor.
  // For bundle (array pairWith): id=anchor, pairWith=targets.
  const anchor = isPair ? (isArrayPair ? id : pairWith) : id;
  const pairSet = new Set(isPair ? (isArrayPair ? pairTargets : [id]) : []);
  document.body.classList.toggle('hovering-from-detail', isPair);
  if (anchor) {
    document.body.classList.add('hovering');
    svg.querySelectorAll('.edge').forEach(g => {
      const { from, to } = g.dataset;
      const touching = from === anchor || to === anchor;
      g.classList.toggle('is-touching', touching);
      const pairEdge = isPair && (
        (from === anchor && pairSet.has(to)) ||
        (to === anchor && pairSet.has(from))
      );
      g.classList.toggle('is-pair', pairEdge);
    });
    svg.querySelectorAll('.node').forEach(g => {
      const nid = g.dataset.id;
      const touching =
        nid === anchor ||
        Array.from(svg.querySelectorAll('.edge.is-touching')).some(
          e => e.dataset.from === nid || e.dataset.to === nid
        );
      g.classList.toggle('is-touching-hover', touching);
      g.classList.toggle('is-pair', isPair && pairSet.has(nid));
    });
  } else {
    document.body.classList.remove('hovering');
    svg.querySelectorAll('.edge.is-touching').forEach(g => g.classList.remove('is-touching'));
    svg.querySelectorAll('.edge.is-pair').forEach(g => g.classList.remove('is-pair'));
    svg.querySelectorAll('.node.is-touching-hover').forEach(g => g.classList.remove('is-touching-hover'));
    svg.querySelectorAll('.node.is-pair').forEach(g => g.classList.remove('is-pair'));
  }
}

const STORAGE_KEY = 'flatbase.tables.json';

const DEFAULT_PALETTE = [
  '#4E79A7', '#F28E2B', '#59A14F', '#B07AA1',
  '#E15759', '#76B7B2', '#9C755F', '#EDC948',
  '#FF9DA7', '#BAB0AC',
];

function deriveDomains(tables) {
  const seen = [];
  for (const t of tables) {
    if (t.domain && !seen.includes(t.domain)) seen.push(t.domain);
  }
  return seen.map((id, i) => ({ id, color: DEFAULT_PALETTE[i % DEFAULT_PALETTE.length] }));
}

// Normalize a raw schema (single-file or bundled from folder) into the shape
// the renderer expects. See docs/FORMAT.md for the canonical format.
function normalizeData(data) {
  if (!data || !Array.isArray(data.tables)) {
    throw new Error('missing "tables" array');
  }

  // Snapshot the pristine input BEFORE mutation (source for the arbitrated export), and
  // detect proposal mode = any element carries `proposed: true`.
  RAW_INPUT = JSON.parse(JSON.stringify(data));
  data.__hasProposed = data.tables.some(t =>
      t.proposed || (Array.isArray(t.columns) && t.columns.some(c => typeof c === 'object' && c.proposed))
                 || (Array.isArray(t.relations) && t.relations.some(r => r && r.proposed)))
    || (Array.isArray(data.enums) && data.enums.some(e => e.proposed));

  if (!Array.isArray(data.domains) || data.domains.length === 0) {
    data.domains = deriveDomains(data.tables);
  } else {
    // Fill in missing colors from the palette in declaration order
    data.domains = data.domains.map((d, i) => ({
      ...d,
      color: d.color || DEFAULT_PALETTE[i % DEFAULT_PALETTE.length],
    }));
  }

  for (const t of data.tables) {
    // status (preferred) ↔ modeled (legacy alias)
    if (t.status !== undefined) {
      t.modeled = t.status === 'complete';
    } else if (t.modeled === undefined) {
      t.modeled = true;
    }

    // Normalize fk: object → string id (preserve original on `fk_ref`)
    for (const col of (t.columns || [])) {
      if (col && typeof col === 'object' && col.fk && typeof col.fk === 'object') {
        col.fk_ref = col.fk;
        col.fk = col.fk.table;
      }
    }
  }

  deriveRelations(data.tables);
  return data;
}

function deriveRelations(tables) {
  const tableById = Object.fromEntries(tables.map(t => [t.id, t]));

  // Pass 1 — for tables without explicit relations, derive belongs_to and polymorphic from columns.
  for (const t of tables) {
    if (Array.isArray(t.relations) && t.relations.length > 0) continue;
    const rels = [];
    for (const col of (t.columns || [])) {
      if (!col || typeof col !== 'object') continue;
      // Derived relations inherit `proposed` from their carrying column (or the whole
      // table); via/viaTable point back to that column so arbitration can drop the edge.
      const proposed = !!(col.proposed || t.proposed);
      if (col.polymorphic && Array.isArray(col.polymorphic.targets)) {
        rels.push({ type: 'polymorphic', targets: col.polymorphic.targets, label: col.name,
                    proposed, via: col.name, viaTable: t.id });
      } else if (col.fk) {
        rels.push({ type: 'belongs_to', target: col.fk, label: col.name,
                    proposed, via: col.name, viaTable: t.id });
      }
    }
    t.relations = rels;
  }

  // Pass 2 — inject has_many on each parent for any belongs_to that doesn't have a matching forward relation.
  for (const child of tables) {
    for (const rel of (child.relations || [])) {
      if (rel.type !== 'belongs_to') continue;
      const parent = tableById[rel.target];
      if (!parent) continue;
      parent.relations = parent.relations || [];
      const exists = parent.relations.some(r =>
        (r.target === child.id || (r.targets || []).includes(child.id)) &&
        (r.type === 'has_many' || r.type === 'has_one' || r.type === 'extends' || r.type === 'many_to_many')
      );
      if (!exists) parent.relations.push({ type: 'has_many', target: child.id,
        proposed: !!rel.proposed, via: rel.via, viaTable: rel.viaTable || child.id });
    }
  }

  // Pass 3 — extension tables: replace the parent's auto-injected has_many with extends.
  for (const child of tables) {
    if (child.type !== 'extension') continue;
    const pkFk = (child.columns || []).find(c => c && typeof c === 'object' && c.pk && c.fk);
    if (!pkFk) continue;
    const parent = tableById[pkFk.fk];
    if (!parent) continue;
    parent.relations = (parent.relations || []).filter(r =>
      !(r.type === 'has_many' && r.target === child.id)
    );
    const already = parent.relations.some(r =>
      r.type === 'extends' && (r.target === child.id || (r.targets || []).includes(child.id))
    );
    if (!already) parent.relations.push({ type: 'extends', target: child.id,
      proposed: !!(pkFk.proposed || child.proposed), via: pkFk.name, viaTable: child.id });
  }
}

function loadCachedData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch { return null; }
}

// --- Folder / multi-file ingestion -----------------------------------------

function readFileAsText(file) {
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = () => resolve(r.result);
    r.onerror = () => reject(new Error('Could not read ' + file.name));
    r.readAsText(file);
  });
}

function fileFromEntry(entry) {
  return new Promise((resolve, reject) => entry.file(resolve, reject));
}

function listDirEntry(dirEntry) {
  return new Promise((resolve, reject) => {
    const reader = dirEntry.createReader();
    const all = [];
    const readBatch = () => reader.readEntries(entries => {
      if (entries.length === 0) resolve(all);
      else { all.push(...entries); readBatch(); }
    }, reject);
    readBatch();
  });
}

async function collectJsonFromDir(dirEntry) {
  const files = {};
  const entries = await listDirEntry(dirEntry);
  for (const e of entries) {
    if (!e.isFile || !e.name.endsWith('.json')) continue;
    const f = await fileFromEntry(e);
    files[e.name] = await readFileAsText(f);
  }
  return files;
}

async function collectJsonFromFileList(fileList) {
  const files = {};
  for (const f of fileList) {
    if (!f.name.endsWith('.json')) continue;
    files[f.name] = await readFileAsText(f);
  }
  return files;
}

// Turn a {filename → text} map of a multi-file folder into the canonical shape.
function bundleMultiFile(filesByName) {
  if (!filesByName['index.json']) {
    throw new Error('Multi-file drop requires an index.json.');
  }
  const index = JSON.parse(filesByName['index.json']);
  if (!Array.isArray(index.domains)) {
    throw new Error('index.json: missing "domains" array.');
  }

  const domains = index.domains.map((d, i) => ({
    id: d.id,
    color: d.color || DEFAULT_PALETTE[i % DEFAULT_PALETTE.length],
  }));

  const tables = [];
  for (const d of index.domains) {
    const fname = d.file || `${d.id}.json`;
    const raw = filesByName[fname];
    if (!raw) throw new Error(`Missing ${fname} (referenced by domain "${d.id}").`);
    const parsed = JSON.parse(raw);
    for (const t of (parsed.tables || [])) {
      tables.push({ ...t, domain: t.domain || parsed.domain || d.id });
    }
  }

  const enumsFile = index.enums_file || 'enums.json';
  let enums = [];
  if (filesByName[enumsFile]) {
    try {
      const parsed = JSON.parse(filesByName[enumsFile]);
      enums = Array.isArray(parsed.enums) ? parsed.enums : [];
    } catch (e) {
      throw new Error(`${enumsFile}: ${e.message}`);
    }
  }

  return { meta: index.meta || {}, domains, enums, tables };
}

// Inspect a DataTransfer and produce a raw (pre-normalization) data object.
async function readDrop(dt) {
  // 1. Directory entry?
  if (dt.items) {
    for (const it of dt.items) {
      const entry = it.webkitGetAsEntry && it.webkitGetAsEntry();
      if (entry && entry.isDirectory) {
        const files = await collectJsonFromDir(entry);
        return bundleMultiFile(files);
      }
    }
  }
  // 2. Multiple files with index.json → treat as multi-file bundle.
  const fileList = [...(dt.files || [])];
  if (fileList.length > 1 && fileList.some(f => f.name === 'index.json')) {
    const files = await collectJsonFromFileList(fileList);
    return bundleMultiFile(files);
  }
  // 3. Single file.
  if (fileList[0]) {
    const text = await readFileAsText(fileList[0]);
    return JSON.parse(text);
  }
  throw new Error('Drop a tables.json file or a schema/ folder.');
}

function pickFile() {
  return new Promise((resolve) => {
    const overlay = document.createElement('div');
    overlay.id = 'data-picker';
    Object.assign(overlay.style, {
      position: 'fixed', inset: '0', background: 'rgba(30,30,46,0.97)',
      color: '#cdd6f4', display: 'flex', alignItems: 'center', justifyContent: 'center',
      zIndex: '9999', padding: '24px', fontFamily: 'system-ui, sans-serif',
    });
    overlay.innerHTML = `
      <div id="drop-zone" style="max-width:560px;width:100%;border:2px dashed #45475a;border-radius:12px;padding:40px 32px;text-align:center;cursor:pointer;transition:border-color 0.15s, background 0.15s;">
        <h1 style="font-size:20px;margin-bottom:12px;">Load a schema</h1>
        <p style="margin-bottom:8px;opacity:0.8;">Drop a <code style="background:#313244;padding:1px 6px;border-radius:3px;">tables.json</code> file <em>or</em> a multi-file <code style="background:#313244;padding:1px 6px;border-radius:3px;">schema/</code> folder (multi-file layout).</p>
        <p style="font-size:12px;opacity:0.55;margin-bottom:24px;">Cached in your browser; no server, no upload. Format spec: <code style="background:#313244;padding:1px 5px;border-radius:3px;">docs/FORMAT.md</code>.</p>
        <p style="font-size:11px;opacity:0.5;">First time? Copy the bundled example:</p>
        <pre style="background:#11111b;padding:8px 12px;border-radius:6px;display:inline-block;margin-top:6px;font-size:11px;">cp tables.json.example tables.json</pre>
        <p id="picker-error" style="color:#f38ba8;font-size:12px;margin-top:16px;min-height:1.2em;white-space:pre-wrap;"></p>
        <input id="file-input" type="file" accept=".json,application/json" style="display:none;">
      </div>
    `;
    document.body.appendChild(overlay);

    const dz = overlay.querySelector('#drop-zone');
    const input = overlay.querySelector('#file-input');
    const errEl = overlay.querySelector('#picker-error');

    const setError = msg => { errEl.textContent = msg; };
    const setHover = on => {
      dz.style.borderColor = on ? '#89b4fa' : '#45475a';
      dz.style.background = on ? 'rgba(137,180,250,0.05)' : 'transparent';
    };

    const acceptRaw = (raw) => {
      try {
        const data = normalizeData(raw);
        // Cache the PRISTINE input (normalizeData snapshots it into RAW_INPUT before it
        // mutates in place), so a later reload re-snapshots pristine data — the arbitrated
        // export must not carry normalize-injected fields (modeled/relations/fk_ref…).
        localStorage.setItem(STORAGE_KEY, JSON.stringify(RAW_INPUT));
        overlay.remove();
        resolve(data);
      } catch (e) { setError('Invalid schema: ' + e.message); }
    };

    dz.addEventListener('click', () => input.click());
    input.addEventListener('change', async e => {
      const file = e.target.files[0];
      if (!file) return;
      try { acceptRaw(JSON.parse(await readFileAsText(file))); }
      catch (err) { setError(err.message); }
    });
    dz.addEventListener('dragover', e => { e.preventDefault(); setHover(true); });
    dz.addEventListener('dragleave', () => setHover(false));
    dz.addEventListener('drop', async e => {
      e.preventDefault(); setHover(false);
      try { acceptRaw(await readDrop(e.dataTransfer)); }
      catch (err) { setError(err.message); }
    });
    overlay.addEventListener('dragover', e => e.preventDefault());
    overlay.addEventListener('drop', e => e.preventDefault());
  });
}

function slugifyMeta(meta) {
  const src = (meta && (meta.version || meta.scope)) || 'schema';
  return String(src)
    .toLowerCase()
    .replace(/[^a-z0-9]+/g, '-')
    .replace(/^-+|-+$/g, '')
    || 'schema';
}

// Produces a self-contained HTML string that, when opened, runs the same
// viewer with DATA baked in as window.__BAKED_DATA__. Reads the live
// document's <style> and main <script> so the output stays in sync with
// the source file automatically.
function buildFrozenHTML(data) {
  // Inside this function we MUST NOT write the literal byte sequence
  // `<` + `/script>` in any comment or template — the HTML parser
  // scanning db-viewer.html in script-data state would treat it as
  // the closing tag of THIS script and abort parsing. Regex literals
  // are safe because `<\/` breaks the match. Strings emitted at
  // runtime use SC, built from concatenation so the source bytes
  // never form the dangerous sequence.
  const SC = '</' + 'script>';

  const styleText  = document.querySelector('style').textContent;
  const scriptText = document.querySelector('script').textContent;
  const slug       = slugifyMeta(data.meta);
  const title      = data.meta && (data.meta.scope || data.meta.version)
    ? `flatbase — ${slug}`
    : 'flatbase';

  // User-authored strings might contain the close-script sequence — escape
  // it so the inline data block can't be closed prematurely in the export.
  const jsonText = JSON.stringify(data).replace(/<\/script>/gi, '<\\/script>');

  // Hardcoded body skeleton — must match the source file's <body> markup
  // (minus runtime-injected children). Keep in sync if the source body
  // structure changes.
  const bodyMarkup = `
<header id="header">
  <span class="app-title">flatbase <small>v0.5</small></span>
  <div id="domain-filters"></div>
  <select id="proposed-filter" title="Filter by proposed/defined">
    <option value="all">Show: All</option>
    <option value="proposed">Proposed only</option>
    <option value="defined">Defined only</option>
  </select>
  <button id="fit-btn" title="Fit the whole diagram into view">Fit</button>
  <button id="reset-btn">Reset</button>
  <button id="reload-data-btn" title="Load a different tables.json (also clears arbitration decisions)">↻ Data</button>
  <button id="export-btn" title="Download a standalone HTML viewer with this schema baked in">↓ Export</button>
  <button id="export-proposal-btn" style="display:none" title="Download the arbitrated proposal.json (kept + overruled, ignored removed)">↓ Proposal</button>
</header>

<div id="main">
  <nav id="sidebar">
    <div id="sidebar-tools">
      <input id="sidebar-search" type="search" placeholder="Search tables…" autocomplete="off">
      <div id="sidebar-count"></div>
    </div>
    <div id="sidebar-list"></div>
  </nav>
  <div id="diagram-wrap">
    <svg id="diagram">
      <defs id="svg-defs"></defs>
      <g id="viewport">
        <g id="edge-layer"></g>
        <g id="node-layer"></g>
      </g>
    </svg>
  </div>
  <aside id="detail-panel" class="closed">
    <header>
      <h2 id="detail-name-en"></h2>
      <button id="detail-close" aria-label="Close">×</button>
    </header>
    <div id="detail-body"></div>
  </aside>
</div>`;

  return `<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>${title}</title>
<style>${styleText}</style>
</head>
<body>
${bodyMarkup}
<script>window.__BAKED_DATA__ = ${jsonText};${SC}
<script>${scriptText}${SC}
</body>
</html>
`;
}

function exportFrozenHTML() {
  if (!DATA || !RAW_INPUT) return;
  // Bake the PRISTINE input, not the normalized DATA: the frozen load path re-runs
  // normalizeData() anyway, and it keeps RAW_INPUT clean in the frozen viewer so the
  // ↓ Proposal export stays free of normalize-injected fields.
  const html = buildFrozenHTML(RAW_INPUT);
  const blob = new Blob([html], { type: 'text/html' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = `flatbase-${slugifyMeta(DATA.meta)}.html`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

async function loadData() {
  if (window.__BAKED_DATA__) {
    // Baked HTML: data is inlined, skip cache and picker entirely.
    return normalizeData(window.__BAKED_DATA__);
  }
  const cached = loadCachedData();
  if (cached) {
    try { return normalizeData(cached); }
    catch { /* fall through to picker if cache is unparseable */ }
  }
  return await pickFile();
}

function clearCachedData() {
  localStorage.removeItem(STORAGE_KEY);
  // Arbitration decisions and the saved layout belong to the loaded proposal —
  // a data reset discards them too, so a new proposal with the same
  // meta.project never inherits stale decisions or node positions.
  try { if (DATA) localStorage.removeItem(arbKey()); } catch {}
  try { if (DATA) localStorage.removeItem(layoutKey()); } catch {}
  location.reload();
}

// ---- viewport: pan / zoom / fit ----
function applyViewport() {
  const vp = document.getElementById('viewport');
  if (vp) vp.setAttribute('transform', `translate(${panX},${panY}) scale(${zoomK})`);
}

// Screen (client) point → world coordinates under the current transform.
function screenToWorld(clientX, clientY) {
  const s = document.getElementById('diagram').getBoundingClientRect();
  return { x: (clientX - s.left - panX) / zoomK, y: (clientY - s.top - panY) / zoomK };
}

// Bounding box (world coords) of the currently visible nodes.
function visibleBBox() {
  let a = Infinity, b = Infinity, c = -Infinity, d = -Infinity;
  const hiddenSet = new Set(getVisibleIds());
  for (const t of DATA.tables) {
    if (!hiddenSet.has(t.id)) continue;
    const p = positions[t.id];
    if (!p) continue;
    a = Math.min(a, p.x); b = Math.min(b, p.y);
    c = Math.max(c, p.x + NODE_W); d = Math.max(d, p.y + NODE_H);
  }
  if (!isFinite(a)) return null;
  return { a, b, c, d };
}

// Fit the visible graph into the container, clearing pan/zoom to a framed view.
function fitView() {
  const svg = document.getElementById('diagram');
  const s = svg.getBoundingClientRect();
  const box = visibleBBox();
  if (!box) return;
  const w = box.c - box.a, h = box.d - box.b;
  if (w <= 0 || !isFinite(w)) return;
  zoomK = Math.max(0.12, Math.min(s.width / (w + 120), s.height / (h + 120), 1.4));
  panX = (s.width - w * zoomK) / 2 - box.a * zoomK;
  panY = (s.height - h * zoomK) / 2 - box.b * zoomK;
  applyViewport();
}

// Pan so a node's center sits at the container center, keeping the current zoom.
// Called only on intentional navigation (sidebar / FK click).
function centerViewportOnNode(id) {
  const p = positions[id];
  if (!p) return;
  const s = document.getElementById('diagram').getBoundingClientRect();
  const wx = p.x + NODE_W / 2, wy = p.y + NODE_H / 2;
  panX = s.width / 2 - wx * zoomK;
  panY = s.height / 2 - wy * zoomK;
  applyViewport();
}

function isPanGesture(ev) { return spaceDown || ev.button === 2; }

// ---- node drag ----
// A left-button pointerdown on a node starts a *potential* drag. Movement past a
// 4px threshold promotes it to a real drag: from then on we only rewrite the
// node group's transform + its incident edge paths (rAF-throttled), never a full
// render. The drop does one full render() + saveLayout(). panMoved is shared with
// the pan gesture so the capture-phase click guard swallows the drag's click —
// a dragged node must NOT open the detail panel.
function startNodeDrag(ev, id) {
  if (isPanGesture(ev)) return;      // hand-tool: let the pan handler on the SVG take it
  if (ev.button !== 0) return;       // left button only
  if (!positions[id]) return;
  ev.stopPropagation();              // pre-empt the SVG pointerdown (pan) for this gesture
  panMoved = false;                  // fresh gesture — clear any stale flag
  const w = screenToWorld(ev.clientX, ev.clientY);
  dragNode = { id, dx: w.x - positions[id].x, dy: w.y - positions[id].y,
               sx: ev.clientX, sy: ev.clientY, moved: false, pointerId: ev.pointerId };
}

// Called from the SVG pointermove handler while a node drag is live.
function onNodeDragMove(ev) {
  if (Math.abs(ev.clientX - dragNode.sx) + Math.abs(ev.clientY - dragNode.sy) > 4) {
    if (!dragNode.moved) {
      dragNode.moved = true;
      // Capture lazily — only once the drag is real — so a plain click never
      // retargets and still dispatches to the node handler.
      try { document.getElementById('diagram').setPointerCapture(dragNode.pointerId); } catch {}
    }
    panMoved = true;                 // swallow the click this gesture will emit
  }
  const w = screenToWorld(ev.clientX, ev.clientY);
  positions[dragNode.id].x = w.x - dragNode.dx;
  positions[dragNode.id].y = w.y - dragNode.dy;
  if (dragRAF) return;
  dragRAF = requestAnimationFrame(() => {
    dragRAF = null;
    if (!dragNode) return;
    const g = document.querySelector(`#node-layer .node[data-id="${cssEscape(dragNode.id)}"]`);
    if (g) g.setAttribute('transform', `translate(${positions[dragNode.id].x},${positions[dragNode.id].y})`);
    redrawIncidentEdges(dragNode.id);
  });
}

// Called from the SVG pointerup/pointercancel handler to finish a node drag.
function endNodeDrag() {
  if (dragRAF) { cancelAnimationFrame(dragRAF); dragRAF = null; }
  const moved = dragNode.moved;
  try { document.getElementById('diagram').releasePointerCapture(dragNode.pointerId); } catch {}
  dragNode = null;
  if (moved) { render(); saveLayout(); }   // persist the manual arrangement
}

function cssEscape(s) {
  return (window.CSS && CSS.escape) ? CSS.escape(s) : String(s).replace(/["\\]/g, '\\$&');
}

// ---- focus mode ----
// applyFocus reads focusedNode/focusedEdge and toggles .dim/.hi on the live DOM
// (called as the last line of render() so it survives every re-render, and
// directly on edge focus which does not rebuild the DOM).
function applyFocus() {
  const svg = document.getElementById('diagram');
  if (!svg) return;
  const nodeEls = svg.querySelectorAll('#node-layer .node');
  const edgeEls = svg.querySelectorAll('#edge-layer .edge');
  if (focusedNode == null && focusedEdge == null) {
    document.body.classList.remove('focusing');
    nodeEls.forEach(g => g.classList.remove('dim', 'hi'));
    edgeEls.forEach(g => g.classList.remove('dim', 'hi'));
    return;
  }
  document.body.classList.add('focusing');
  let keepN, keepEdge;
  if (focusedEdge) {
    const { from, to } = focusedEdge;
    keepN = new Set([from, to]);
    keepEdge = (f, t) => (f === from && t === to) || (f === to && t === from);
  } else {
    keepN = new Set([focusedNode, ...getNeighbors(focusedNode)]);
    keepEdge = (f, t) => f === focusedNode || t === focusedNode;
  }
  nodeEls.forEach(g => {
    const keep = keepN.has(g.dataset.id);
    g.classList.toggle('hi', keep);
    g.classList.toggle('dim', !keep);
  });
  edgeEls.forEach(g => {
    const keep = keepEdge(g.dataset.from, g.dataset.to);
    g.classList.toggle('hi', keep);
    g.classList.toggle('dim', !keep);
  });
}

function focusNode(id) {
  focusedNode = id;
  focusedEdge = null;
  applyFocus();
}

function focusEdge(edge) {
  focusedEdge = { from: edge.from, to: edge.to };
  focusedNode = null;
  applyFocus();
}

function clearFocus() {
  focusedNode = null;
  focusedEdge = null;
  applyFocus();               // class-only — never triggers a full render()
}

function onWheel(ev) {
  ev.preventDefault();
  const svg = document.getElementById('diagram');
  const s = svg.getBoundingClientRect();
  if (ev.ctrlKey || ev.metaKey) {                    // ctrl/⌘ + wheel → zoom at cursor
    const mx = ev.clientX - s.left, my = ev.clientY - s.top;
    const wx = (mx - panX) / zoomK, wy = (my - panY) / zoomK;
    const f = ev.deltaY < 0 ? 1.12 : 1 / 1.12;
    zoomK = Math.max(0.12, Math.min(3, zoomK * f));
    panX = mx - wx * zoomK; panY = my - wy * zoomK;
    applyViewport();
    return;
  }
  // deltaMode: 0=pixels, 1=lines, 2=pages → normalize to pixels.
  const u = ev.deltaMode === 1 ? 16 : (ev.deltaMode === 2 ? s.height : 1);
  const dx = ev.deltaX * u, dy = ev.deltaY * u;
  if (ev.shiftKey) panX -= (dx || dy);               // shift → horizontal
  else { panX -= dx; panY -= dy; }                   // wheel → 2D pan
  applyViewport();
}

function initViewport() {
  const svg = document.getElementById('diagram');

  svg.addEventListener('wheel', onWheel, { passive: false });

  // Right-drag / Space-drag = hand tool. contextmenu suppressed on the diagram only.
  svg.addEventListener('contextmenu', ev => ev.preventDefault());

  svg.addEventListener('pointerdown', ev => {
    panMoved = false;                 // reset on ANY pointerdown so a stale flag
                                      // from a prior right-drag can't swallow the next click
    if (!isPanGesture(ev)) return;
    ev.preventDefault();
    panning = { x: ev.clientX, y: ev.clientY, px: panX, py: panY };
    svg.classList.add('panning');
    try { svg.setPointerCapture(ev.pointerId); } catch {}
  });
  svg.addEventListener('pointermove', ev => {
    if (dragNode) { onNodeDragMove(ev); return; }   // node drag takes priority over pan
    if (!panning) return;
    if (Math.abs(ev.clientX - panning.x) + Math.abs(ev.clientY - panning.y) > 4) panMoved = true;
    panX = panning.px + (ev.clientX - panning.x);
    panY = panning.py + (ev.clientY - panning.y);
    applyViewport();
  });
  const endGesture = () => {
    if (dragNode) endNodeDrag();
    if (!panning) return;
    panning = null;
    svg.classList.remove('panning');
    if (spaceDown) svg.classList.add('grab');
  };
  svg.addEventListener('pointerup', endGesture);
  svg.addEventListener('pointercancel', endGesture);

  // Swallow the click a pan/drag gesture emits (capture phase, before node handlers).
  svg.addEventListener('click', ev => {
    if (panMoved) { ev.stopPropagation(); ev.preventDefault(); panMoved = false; }
  }, true);

  // Background click on empty canvas clears focus. Node/edge handlers
  // stopPropagation so only true background clicks reach here; a pan on empty
  // canvas sets panMoved and is ignored.
  svg.addEventListener('click', () => {
    if (panMoved) return;
    clearFocus();
  });

  // Space = hand tool, but never when typing in the sidebar search.
  window.addEventListener('keydown', ev => {
    if (ev.code !== 'Space') return;
    const el = document.activeElement;
    if (el && (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA' || el.tagName === 'SELECT')) return;
    if (!spaceDown) { spaceDown = true; svg.classList.add('grab'); }
    ev.preventDefault();
  });
  window.addEventListener('keyup', ev => {
    if (ev.code !== 'Space') return;
    spaceDown = false;
    svg.classList.remove('grab');
    if (!panning) svg.classList.remove('panning');
  });
}

async function init() {
  DATA = await loadData();
  DOMAIN_ORDER = DATA.domains.map(d => d.id);
  DOMAIN_COLORS = Object.fromEntries(DATA.domains.map(d => [d.id, d.color]));

  // Arbitration decisions must be loaded before the first paint (proposed nodes
  // render their ignored/overruled state from them). Layout doesn't depend on it.
  if (DATA.__hasProposed) {
    loadArbitration();
    document.getElementById('export-proposal-btn').style.display = '';
  }

  buildInverseRelations();
  setupDefs();
  applyLayout();
  render();
  initViewport();
  fitView();

  document.getElementById('reset-btn').addEventListener('click', resetState);
  document.getElementById('fit-btn').addEventListener('click', fitView);
  document.getElementById('sidebar-search').addEventListener('input', (e) => {
    sidebarSearch = e.target.value.trim().toLowerCase();
    renderSidebar();               // sidebar-only filter — the diagram is untouched
  });
  document.getElementById('proposed-filter').addEventListener('change', (e) => {
    proposedFilter = e.target.value;
    render();
  });
  document.getElementById('export-btn').addEventListener('click', exportFrozenHTML);
  document.getElementById('export-proposal-btn').addEventListener('click', exportProposal);
  const reloadBtn = document.getElementById('reload-data-btn');
  if (window.__BAKED_DATA__) {
    reloadBtn.style.display = 'none';
  } else {
    reloadBtn.addEventListener('click', clearCachedData);
  }
  document.getElementById('detail-close').addEventListener('click', closeDetailPanel);
  document.addEventListener('keydown', (e) => {
    if (e.key !== 'Escape') return;
    // Escape clears focus; if a panel is open it closes it too (closeDetailPanel
    // also clears focus). Both-at-once is intended.
    if (openPanelId) closeDetailPanel();
    else clearFocus();
  });
}

init();
</script>
</body>
</html>
